<svg xmlns="http://www.w3.org/2000/svg" width="2700" height="1650" viewBox="0 0 2700 1650"><defs><marker id="arrow-black" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 Z" fill="#1f2937"/></marker><marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 Z" fill="#2563eb"/></marker><marker id="arrow-green" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 Z" fill="#16a34a"/></marker><marker id="arrow-grey" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/></marker><marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 Z" fill="#ea580c"/></marker><marker id="arrow-violet" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 Z" fill="#7c3aed"/></marker><marker id="arrow-yellow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 Z" fill="#eab308"/></marker><marker id="arrow-white" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 Z" fill="#ffffff"/></marker><style>text{font-family:Inter,ui-sans-serif,system-ui,sans-serif}.frame-label{font-size:18px;font-weight:700}.geo-label{font-size:18px;font-weight:600}.detail{font-size:15px}.note-label{font-size:13px}.arrow-label{font-size:17px;font-weight:700;paint-order:stroke;stroke:#fff;stroke-width:5px;stroke-linejoin:round}</style></defs><rect width="100%" height="100%" fill="#fff"/><text x="80" y="63" class="detail" text-anchor="start" fill="#1f2937">Scotty: cloud agents on Cloudflare</text><text x="82" y="138" class="detail" text-anchor="start" fill="#64748b">Durable Codex sessions: beam up → work live → sleep → resume → ship or beam down</text><rect x="420" y="150" width="117" height="67.5" rx="3" fill="#eab308" fill-opacity="0.18" stroke="#eab308" stroke-width="1.5"/><text x="430" y="170" class="note-label" fill="#1f2937">Start here →</text><text x="430" y="186" class="note-label" fill="#1f2937">follow 1–8</text><rect x="80" y="250" width="500" height="820" rx="8" fill="none" stroke="#7c3aed" stroke-width="3"/><rect x="92" y="234" width="146" height="28" rx="5" fill="#fff"/><text x="100" y="254" class="frame-label" fill="#7c3aed">💻 Your laptop</text><rect x="700" y="250" width="1200" height="1320" rx="8" fill="none" stroke="#2563eb" stroke-width="3"/><rect x="712" y="234" width="137" height="28" rx="5" fill="#fff"/><text x="720" y="254" class="frame-label" fill="#2563eb">☁️ Cloudflare</text><rect x="1980" y="250" width="540" height="370" rx="8" fill="none" stroke="#16a34a" stroke-width="3"/><rect x="1992" y="234" width="110" height="28" rx="5" fill="#fff"/><text x="2000" y="254" class="frame-label" fill="#16a34a">🌐 Browser</text><rect x="1980" y="960" width="540" height="470" rx="8" fill="none" stroke="#1f2937" stroke-width="3"/><rect x="1992" y="944" width="245" height="28" rx="5" fill="#fff"/><text x="2000" y="964" class="frame-label" fill="#1f2937">🐙 GitHub  anomalyco/rift</text><rect x="120" y="350" width="420" height="100" rx="10" fill="#7c3aed" fill-opacity="0.12" stroke="#7c3aed" stroke-width="3"/><text x="330" y="406" class="geo-label" text-anchor="middle" fill="#1f2937">scotty CLI</text><rect x="120" y="570" width="420" height="120" rx="10" fill="#7c3aed" fill-opacity="0.12" stroke="#7c3aed" stroke-width="3"/><text x="330" y="624" class="geo-label" text-anchor="middle" fill="#1f2937">~/.codex</text><text x="330" y="648" class="geo-label" text-anchor="middle" fill="#1f2937">(auth.json + sessions)</text><rect x="120" y="800" width="420" height="100" rx="10" fill="#1f2937" fill-opacity="0.12" stroke="#1f2937" stroke-width="3"/><text x="330" y="856" class="geo-label" text-anchor="middle" fill="#1f2937">local repo clone</text><rect x="760" y="340" width="1080" height="120" rx="10" fill="#2563eb" fill-opacity="0.12" stroke="#2563eb" stroke-width="3"/><text x="1300" y="394" class="geo-label" text-anchor="middle" fill="#1f2937">Worker</text><text x="1300" y="418" class="geo-label" text-anchor="middle" fill="#1f2937">(API + web page)</text><rect x="760" y="510" width="500" height="125" rx="10" fill="#2563eb" fill-opacity="0.12" stroke="#2563eb" stroke-width="3"/><text x="1010" y="566.5" class="geo-label" text-anchor="middle" fill="#1f2937">KV: session registry</text><text x="1010" y="590.5" class="geo-label" text-anchor="middle" fill="#1f2937">(id → status, branch, backupId, threadId)</text><rect x="760" y="700" width="1080" height="520" rx="8" fill="none" stroke="#16a34a" stroke-width="3"/><rect x="772" y="684" width="443" height="28" rx="5" fill="#fff"/><text x="780" y="704" class="frame-label" fill="#16a34a">Sandbox container (per session, sleepAfter 60m)</text><rect x="800" y="770" width="400" height="90" rx="10" fill="#16a34a" fill-opacity="0.12" stroke="#16a34a" stroke-width="3"/><text x="1000" y="821" class="geo-label" text-anchor="middle" fill="#1f2937">tmux + codex TUI</text><rect x="1330" y="770" width="460" height="90" rx="10" fill="#1f2937" fill-opacity="0.12" stroke="#1f2937" stroke-width="3"/><text x="1560" y="821" class="geo-label" text-anchor="middle" fill="#1f2937">git worktree (latest dev)</text><text x="1560" y="918" class="detail" text-anchor="middle" fill="#64748b">baked bare clone + fetch delta</text><rect x="800" y="1000" width="400" height="90" rx="10" fill="#16a34a" fill-opacity="0.12" stroke="#16a34a" stroke-width="3"/><text x="1000" y="1051" class="geo-label" text-anchor="middle" fill="#1f2937">~/.codex (seeded)</text><text x="1000" y="1148" class="detail" text-anchor="middle" fill="#64748b">refreshes in place</text><rect x="1330" y="1000" width="460" height="90" rx="10" fill="#64748b" fill-opacity="0.12" stroke="#64748b" stroke-width="3"/><text x="1560" y="1039" class="geo-label" text-anchor="middle" fill="#1f2937">session workdir + branch</text><text x="1560" y="1063" class="geo-label" text-anchor="middle" fill="#1f2937">(thread survives reconnects)</text><rect x="1370" y="1320" width="410" height="110" rx="10" fill="#ea580c" fill-opacity="0.12" stroke="#ea580c" stroke-width="3"/><text x="1575" y="1369" class="geo-label" text-anchor="middle" fill="#1f2937">R2: snapshots</text><text x="1575" y="1393" class="geo-label" text-anchor="middle" fill="#1f2937">(createBackup → squashfs)</text><rect x="2040" y="355" width="420" height="110" rx="10" fill="#16a34a" fill-opacity="0.12" stroke="#16a34a" stroke-width="3"/><text x="2250" y="404" class="geo-label" text-anchor="middle" fill="#1f2937">ghostty-web terminal</text><text x="2250" y="428" class="geo-label" text-anchor="middle" fill="#1f2937">scotty.dev/s/&lt;id&gt;</text><rect x="2040" y="1075" width="220" height="90" rx="10" fill="#1f2937" fill-opacity="0.12" stroke="#1f2937" stroke-width="3"/><text x="2150" y="1126" class="geo-label" text-anchor="middle" fill="#1f2937">dev branch</text><rect x="2040" y="1235" width="220" height="90" rx="10" fill="#1f2937" fill-opacity="0.12" stroke="#1f2937" stroke-width="3"/><text x="2150" y="1286" class="geo-label" text-anchor="middle" fill="#1f2937">Pull Request</text><rect x="1980" y="675" width="635" height="245" rx="8" fill="none" stroke="#64748b" stroke-width="3"/><rect x="1992" y="659" width="110" height="28" rx="5" fill="#fff"/><text x="2000" y="679" class="frame-label" fill="#64748b">Legend</text><rect x="2020" y="730" width="145" height="55" rx="10" fill="#2563eb" fill-opacity="1" stroke="#2563eb" stroke-width="3"/><text x="2092.5" y="763.5" class="geo-label" text-anchor="middle" fill="#ffffff">beam up</text><rect x="2205" y="730" width="160" height="55" rx="10" fill="#16a34a" fill-opacity="1" stroke="#16a34a" stroke-width="3"/><text x="2285" y="763.5" class="geo-label" text-anchor="middle" fill="#ffffff">live terminal</text><rect x="2405" y="730" width="170" height="55" rx="10" fill="#ea580c" fill-opacity="1" stroke="#ea580c" stroke-width="3"/><text x="2490" y="763.5" class="geo-label" text-anchor="middle" fill="#ffffff">sleep / resume</text><rect x="2110" y="825" width="145" height="55" rx="10" fill="#1f2937" fill-opacity="1" stroke="#1f2937" stroke-width="3"/><text x="2182.5" y="858.5" class="geo-label" text-anchor="middle" fill="#ffffff">PR</text><rect x="2295" y="825" width="145" height="55" rx="10" fill="#7c3aed" fill-opacity="1" stroke="#7c3aed" stroke-width="3"/><text x="2367.5" y="858.5" class="geo-label" text-anchor="middle" fill="#ffffff">beam down</text><line x1="540" y1="400" x2="760" y2="400" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><text x="650" y="390" class="arrow-label" text-anchor="middle" fill="#2563eb">1  create</text><line x1="1460" y1="460" x2="1460" y2="700" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><text x="1460" y="570" class="arrow-label" text-anchor="middle" fill="#2563eb">2  boot</text><line x1="760" y1="445" x2="540" y2="515" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><text x="650" y="470" class="arrow-label" text-anchor="middle" fill="#2563eb">3  return URL</text><line x1="1840" y1="400" x2="2040" y2="410" stroke="#16a34a" stroke-width="4" marker-end="url(#arrow-green)" marker-start="url(#arrow-green)"/><text x="1940" y="395" class="arrow-label" text-anchor="middle" fill="#16a34a">4  websocket PTY</text><line x1="1700" y1="460" x2="1700" y2="700" stroke="#16a34a" stroke-width="4" marker-end="url(#arrow-green)" marker-start="url(#arrow-green)"/><text x="1700" y="570" class="arrow-label" text-anchor="middle" fill="#16a34a">4  live tmux</text><line x1="1510" y1="1170" x2="1510" y2="1330" stroke="#ea580c" stroke-width="4" marker-end="url(#arrow-orange)"/><text x="1510" y="1240" class="arrow-label" text-anchor="middle" fill="#ea580c">5  snapshot</text><line x1="1770" y1="1330" x2="1770" y2="1170" stroke="#ea580c" stroke-width="4" marker-end="url(#arrow-orange)"/><text x="1770" y="1240" class="arrow-label" text-anchor="middle" fill="#ea580c">6  restore</text><line x1="1840" y1="900" x2="2040" y2="1110" stroke="#1f2937" stroke-width="4" marker-end="url(#arrow-black)"/><text x="1940" y="995" class="arrow-label" text-anchor="middle" fill="#1f2937">7  push + PR</text><line x1="800" y1="1040" x2="540" y2="900" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrow-violet)"/><text x="670" y="960" class="arrow-label" text-anchor="middle" fill="#7c3aed">8  beam down</text><rect x="585" y="280" width="150.79999999999998" height="87" rx="3" fill="#2563eb" fill-opacity="0.18" stroke="#2563eb" stroke-width="1.5"/><text x="595" y="300" class="note-label" fill="#1f2937">1. `scotty up &quot;task&quot;`</text><text x="595" y="316" class="note-label" fill="#1f2937">asks the Worker to</text><text x="595" y="332" class="note-label" fill="#1f2937">create a registered</text><text x="595" y="348" class="note-label" fill="#1f2937">session.</text><rect x="1280" y="500" width="174.20000000000002" height="100.5" rx="3" fill="#2563eb" fill-opacity="0.18" stroke="#2563eb" stroke-width="1.5"/><text x="1290" y="520" class="note-label" fill="#1f2937">2. The Worker boots a</text><text x="1290" y="536" class="note-label" fill="#1f2937">container, fetches</text><text x="1290" y="552" class="note-label" fill="#1f2937">latest dev, creates a</text><text x="1290" y="568" class="note-label" fill="#1f2937">worktree, and starts</text><text x="1290" y="584" class="note-label" fill="#1f2937">Codex inside tmux.</text><rect x="355" y="465" width="130" height="75" rx="3" fill="#2563eb" fill-opacity="0.18" stroke="#2563eb" stroke-width="1.5"/><text x="365" y="485" class="note-label" fill="#1f2937">3. The CLI</text><text x="365" y="501" class="note-label" fill="#1f2937">receives the</text><text x="365" y="517" class="note-label" fill="#1f2937">session web URL.</text><rect x="2230" y="465" width="161.2" height="93" rx="3" fill="#16a34a" fill-opacity="0.18" stroke="#16a34a" stroke-width="1.5"/><text x="2240" y="485" class="note-label" fill="#1f2937">4. PTY bytes stream</text><text x="2240" y="501" class="note-label" fill="#1f2937">over WebSocket.</text><text x="2240" y="517" class="note-label" fill="#1f2937">Reconnecting the</text><text x="2240" y="533" class="note-label" fill="#1f2937">browser never kills</text><text x="2240" y="549" class="note-label" fill="#1f2937">Codex because tmux owns</text><text x="2240" y="565" class="note-label" fill="#1f2937">it.</text><rect x="760" y="1290" width="187.2" height="108" rx="3" fill="#ea580c" fill-opacity="0.18" stroke="#ea580c" stroke-width="1.5"/><text x="770" y="1310" class="note-label" fill="#1f2937">5. After 60 min idle,</text><text x="770" y="1326" class="note-label" fill="#1f2937">snapshot the workdir and</text><text x="770" y="1342" class="note-label" fill="#1f2937">~/.codex to R2, then sleep</text><text x="770" y="1358" class="note-label" fill="#1f2937">at ≈ zero compute cost.</text><rect x="1080" y="1290" width="182" height="105" rx="3" fill="#ea580c" fill-opacity="0.18" stroke="#ea580c" stroke-width="1.5"/><text x="1090" y="1310" class="note-label" fill="#1f2937">6. `scotty resume`</text><text x="1090" y="1326" class="note-label" fill="#1f2937">restores into a fresh</text><text x="1090" y="1342" class="note-label" fill="#1f2937">container; `codex resume`</text><text x="1090" y="1358" class="note-label" fill="#1f2937">continues the same thread.</text><rect x="2305" y="1065" width="161.2" height="93" rx="3" fill="#64748b" fill-opacity="0.18" stroke="#64748b" stroke-width="1.5"/><text x="2315" y="1085" class="note-label" fill="#1f2937">7. `scotty pr` pushes</text><text x="2315" y="1101" class="note-label" fill="#1f2937">the session branch,</text><text x="2315" y="1117" class="note-label" fill="#1f2937">then runs `gh pr create</text><text x="2315" y="1133" class="note-label" fill="#1f2937">--base dev`.</text><rect x="340" y="940" width="150.79999999999998" height="87" rx="3" fill="#7c3aed" fill-opacity="0.18" stroke="#7c3aed" stroke-width="1.5"/><text x="350" y="960" class="note-label" fill="#1f2937">8. `scotty down`</text><text x="350" y="976" class="note-label" fill="#1f2937">copies branch +</text><text x="350" y="992" class="note-label" fill="#1f2937">rollout JSONL home.</text><text x="350" y="1008" class="note-label" fill="#1f2937">Continue locally with</text><text x="350" y="1024" class="note-label" fill="#1f2937">`codex resume</text><text x="350" y="1040" class="note-label" fill="#1f2937">&lt;uuid&gt;`.</text></svg>