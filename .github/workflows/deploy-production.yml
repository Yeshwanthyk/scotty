name: Deploy production

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scotty-alchemy-${{ github.repository }}-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45
    env:
      ALCHEMY_TELEMETRY_DISABLED: "1"
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SCOTTY_CHUNK2_ABSENCE_CONFIRMED: ${{ secrets.SCOTTY_CHUNK2_ABSENCE_CONFIRMED }}
      SCOTTY_CHUNK2_APPROVE_GREENFIELD: ${{ secrets.SCOTTY_CHUNK2_APPROVE_GREENFIELD }}
      SCOTTY_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SCOTTY_HOST: ${{ secrets.SCOTTY_PRODUCTION_HOST }}
      SCOTTY_TOKEN: ${{ secrets.SCOTTY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: oven-sh/setup-bun@v2
      - run: npm ci
      - run: npm run check
      - name: Reconcile current runtime inventory
        run: npm run audit:containers
      - name: Deploy through the sole production owner
        run: npx alchemy deploy alchemy.run.ts --stage production --yes
      - name: Reconcile deployed runtime inventory
        run: npm run audit:containers
