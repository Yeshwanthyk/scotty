<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#090d12" />
    <meta name="referrer" content="same-origin" />
    <title>Scotty terminal</title>
    <script>
      // The Worker normally exchanges ?t= for an HttpOnly cookie before serving this
      // page. Scrub defensively before any subresource loads; never extract or retain it.
      (() => {
        const clean = new URL(window.location.href);
        if (!clean.searchParams.has("t")) return;
        clean.searchParams.delete("t");
        history.replaceState(null, "", `${clean.pathname}${clean.search}${clean.hash}`);
      })();
    </script>
    <style>
      :root {
        color-scheme: dark;
        --space: oklch(13% 0.012 248);
        --shell: oklch(16% 0.014 248);
        --terminal: #0b1016;
        --ink: oklch(93% 0.012 220);
        --muted: oklch(70% 0.025 230);
        --quiet: oklch(53% 0.024 235);
        --line: oklch(30% 0.025 235);
        --beam: oklch(79% 0.115 200);
        --warm: oklch(79% 0.12 78);
        --danger: oklch(70% 0.16 25);
        --focus: oklch(84% 0.13 197);
        --header-height: 54px;
        --mono:
          "BerkeleyMono Nerd Font", "Berkeley Mono", "SFMono-Regular", "Cascadia Mono",
          "Liberation Mono", Consolas, monospace;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-synthesis: none;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        min-width: 280px;
        overflow: hidden;
        background: var(--space);
        color: var(--ink);
      }

      button {
        font: inherit;
      }

      .app {
        position: relative;
        display: grid;
        grid-template-rows: var(--header-height) minmax(0, 1fr);
        height: var(--app-height, 100dvh);
        min-height: 320px;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom)
          env(safe-area-inset-left);
        background:
          radial-gradient(100% 62% at 50% -18%, oklch(31% 0.05 225 / 0.32), transparent 68%),
          var(--space);
      }

      .masthead {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        gap: 18px;
        min-width: 0;
        padding: 0 16px;
        background: var(--shell);
        box-shadow: 0 1px 0 var(--line);
      }

      .identity {
        display: flex;
        align-items: baseline;
        gap: 10px;
        min-width: 0;
        color: inherit;
        font-family: var(--mono);
        text-decoration: none;
      }

      .wordmark {
        flex: none;
        color: var(--ink);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.09em;
      }

      .session-label {
        overflow: hidden;
        color: var(--muted);
        font-size: 0.72rem;
        font-variant-numeric: tabular-nums;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .status-cluster {
        display: flex;
        align-items: center;
        gap: 9px;
        min-width: 0;
        margin-left: auto;
        color: var(--muted);
        font-size: 0.75rem;
      }

      .signal {
        position: relative;
        width: 8px;
        height: 8px;
        flex: none;
        border-radius: 50%;
        background: var(--quiet);
        box-shadow: 0 0 0 3px oklch(53% 0.024 235 / 0.12);
        transition-property: background-color, box-shadow;
        transition-duration: 180ms;
        transition-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
      }

      .status-text {
        min-width: 0;
        overflow: hidden;
        font-variant-numeric: tabular-nums;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .transport-line {
        position: absolute;
        right: 0;
        bottom: -1px;
        left: 0;
        height: 1px;
        overflow: hidden;
        background: var(--line);
        pointer-events: none;
      }

      .transport-line::after {
        position: absolute;
        inset: 0 auto 0 0;
        width: min(18vw, 180px);
        background: var(--beam);
        content: "";
        opacity: 0;
        transform: translateX(-110%);
      }

      .action {
        min-width: 76px;
        min-height: 40px;
        flex: none;
        padding: 0 13px;
        border: 0;
        border-radius: 5px;
        background: var(--beam);
        color: oklch(18% 0.024 220);
        font-size: 0.75rem;
        font-weight: 720;
        cursor: pointer;
        transition-property: background-color, color, opacity, scale;
        transition-duration: 160ms;
        transition-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
      }

      .action:hover {
        background: oklch(86% 0.12 197);
      }
      .action:active {
        scale: 0.96;
      }
      .action:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
      }
      .action:disabled {
        cursor: wait;
        opacity: 0.58;
      }
      .action[hidden] {
        display: none;
      }

      .stage {
        position: relative;
        min-width: 0;
        min-height: 0;
        margin: 10px;
        overflow: hidden;
        border-radius: 7px;
        background: var(--terminal);
        box-shadow:
          0 0 0 1px oklch(34% 0.028 235),
          0 3px 8px oklch(3% 0.01 245 / 0.55);
      }

      .terminal-host {
        position: relative;
        width: 100%;
        height: 100%;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        padding: 12px;
        outline: none;
        touch-action: none;
      }

      .terminal-host canvas {
        display: block;
      }

      .mobile-input {
        display: none;
      }

      .latest-output {
        position: absolute;
        z-index: 3;
        right: 16px;
        bottom: 16px;
        min-width: 80px;
        min-height: 40px;
        padding: 0 13px;
        border: 0;
        border-radius: 20px;
        background: var(--beam);
        box-shadow:
          0 0 0 1px oklch(94% 0.03 200 / 0.15),
          0 5px 18px oklch(3% 0.01 245 / 0.48);
        color: oklch(18% 0.024 220);
        font-size: 0.75rem;
        font-weight: 720;
        cursor: pointer;
        transition-property: background-color, scale, opacity;
        transition-duration: 160ms;
        transition-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
      }

      .latest-output:hover {
        background: oklch(86% 0.12 197);
      }

      .latest-output:active {
        scale: 0.96;
      }

      .latest-output:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
      }

      .latest-output[hidden] {
        display: none;
      }

      .veil {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: oklch(11% 0.012 248 / 0.9);
        opacity: 1;
        transition-property: opacity, visibility;
        transition-duration: 180ms;
        transition-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
      }

      .veil[hidden] {
        visibility: hidden;
        opacity: 0;
        pointer-events: none;
      }

      .state-card {
        width: min(100%, 440px);
        color: var(--muted);
        text-align: center;
      }

      .state-mark {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        margin-bottom: 13px;
        color: var(--warm);
        font-family: var(--mono);
        font-size: 0.72rem;
        letter-spacing: 0.06em;
      }

      .state-mark::before {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: currentColor;
        content: "";
        box-shadow: 0 0 0 4px oklch(79% 0.12 78 / 0.1);
      }

      .state-title {
        margin: 0;
        color: var(--ink);
        font-size: 1.05rem;
        font-weight: 640;
        letter-spacing: -0.015em;
        text-wrap: balance;
      }

      .state-copy {
        max-width: 52ch;
        margin: 8px auto 0;
        color: var(--muted);
        font-size: 0.82rem;
        line-height: 1.55;
        text-wrap: pretty;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .app[data-state="connected"] .signal {
        background: var(--beam);
        box-shadow:
          0 0 0 3px oklch(79% 0.115 200 / 0.12),
          0 0 12px oklch(79% 0.115 200 / 0.32);
      }

      .app[data-state="connecting"] .transport-line::after,
      .app[data-state="reconnecting"] .transport-line::after,
      .app[data-state="resuming"] .transport-line::after {
        opacity: 0.9;
        animation: acquire 1.45s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }

      .app[data-state="sleeping"] .signal {
        background: var(--warm);
        box-shadow: 0 0 0 3px oklch(79% 0.12 78 / 0.12);
      }

      .app[data-state="failed"] .signal,
      .app[data-state="exited"] .signal {
        background: var(--danger);
        box-shadow: 0 0 0 3px oklch(70% 0.16 25 / 0.12);
      }

      @keyframes acquire {
        from {
          transform: translateX(-110%);
        }
        to {
          transform: translateX(calc(100vw + 110%));
        }
      }

      @media (max-width: 560px) {
        :root {
          --header-height: 58px;
        }
        .app {
          position: absolute;
          top: var(--app-top, 0);
          left: var(--app-left, 0);
          width: var(--app-width, 100%);
          grid-template-rows: var(--header-height) minmax(0, 1fr);
          min-height: 0;
          padding-right: 0;
          padding-bottom: 0;
          padding-left: 0;
        }
        .masthead {
          gap: 10px;
          padding-inline: 12px;
        }
        .identity {
          display: grid;
          gap: 1px;
        }
        .wordmark {
          font-size: 0.72rem;
        }
        .session-label {
          max-width: 38vw;
          font-size: 0.65rem;
        }
        .status-cluster {
          gap: 7px;
          font-size: 0.68rem;
        }
        .status-text {
          max-width: 27vw;
        }
        .action {
          min-width: 70px;
          min-height: 40px;
          padding-inline: 11px;
        }
        .stage {
          margin: 0;
          padding-bottom: calc(61px + env(safe-area-inset-bottom));
          border-radius: 0;
          box-shadow: none;
        }
        .terminal-host {
          padding: 8px 6px;
        }
        .veil {
          padding: 18px;
        }
        .mobile-input {
          position: absolute;
          z-index: 4;
          right: env(safe-area-inset-right);
          bottom: env(safe-area-inset-bottom);
          left: env(safe-area-inset-left);
          display: grid;
          align-content: end;
          min-width: 0;
          padding: 7px 8px 8px;
          background: linear-gradient(to top, var(--space) 0 76%, transparent);
        }
        .app[data-keyboard="open"] .mobile-input {
          right: 0;
          bottom: 0;
          left: 0;
        }
        .terminal-keys {
          display: grid;
          width: 100%;
          grid-template-columns: repeat(4, minmax(0, 1fr));
          gap: 6px;
          margin: 0 0 6px;
          padding: 4px;
          border-radius: 12px;
          background: oklch(18% 0.016 245 / 0.98);
          box-shadow:
            0 0 0 1px oklch(93% 0.02 220 / 0.09),
            0 8px 22px oklch(3% 0.01 245 / 0.5);
        }
        .terminal-keys[hidden] {
          display: none;
        }
        .mobile-key {
          width: 100%;
          min-width: 0;
          min-height: 44px;
          padding: 0 10px;
          border: 0;
          border-radius: 8px;
          background: var(--terminal);
          color: var(--ink);
          font-family: var(--mono);
          font-size: 0.75rem;
          font-weight: 620;
          box-shadow: 0 0 0 1px oklch(93% 0.02 220 / 0.1);
          transition-property: background-color, color, scale;
          transition-duration: 140ms;
          transition-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
        }
        .mobile-key:active {
          background: oklch(25% 0.035 220);
          color: var(--beam);
          scale: 0.96;
        }
        .mobile-key:focus-visible {
          position: relative;
          z-index: 1;
          outline: 2px solid var(--focus);
          outline-offset: -2px;
        }
        .prompt-composer {
          display: grid;
          grid-template-columns: 44px minmax(0, 1fr) 44px;
          grid-template-areas: "leading prompt send";
          align-items: center;
          gap: 2px;
          min-width: 0;
          padding: 4px;
          border-radius: 16px;
          background: oklch(17% 0.016 245 / 0.98);
          box-shadow:
            0 0 0 1px oklch(93% 0.02 220 / 0.1),
            0 8px 24px oklch(3% 0.01 245 / 0.52);
          transition-property: background-color, box-shadow;
          transition-duration: 160ms;
          transition-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
        }
        .prompt-composer:focus-within {
          background: oklch(18.5% 0.019 235 / 0.99);
          box-shadow:
            0 0 0 1px oklch(79% 0.115 200 / 0.62),
            0 10px 28px oklch(3% 0.01 245 / 0.58);
        }
        .composer-button {
          display: grid;
          width: 44px;
          height: 44px;
          place-items: center;
          padding: 0;
          border: 0;
          border-radius: 12px;
          background: transparent;
          color: var(--muted);
          transition-property: background-color, color, scale, box-shadow, opacity, filter;
          transition-duration: 150ms;
          transition-timing-function: cubic-bezier(0.2, 0, 0, 1);
        }
        .composer-button:active {
          scale: 0.96;
        }
        .composer-button:focus-visible {
          outline: 2px solid var(--focus);
          outline-offset: -2px;
        }
        .keys-toggle {
          grid-area: leading;
        }
        .keys-toggle[aria-expanded="true"] {
          background: oklch(25% 0.035 220);
          color: var(--beam);
        }
        .cancel-prompt {
          grid-area: leading;
          visibility: hidden;
          color: var(--muted);
          filter: blur(4px);
          opacity: 0;
          scale: 0.25;
          pointer-events: none;
        }
        .mobile-input[data-focused="true"] .keys-toggle {
          visibility: hidden;
          filter: blur(4px);
          opacity: 0;
          scale: 0.25;
          pointer-events: none;
        }
        .mobile-input[data-focused="true"] .cancel-prompt {
          visibility: visible;
          filter: blur(0);
          opacity: 1;
          scale: 1;
          pointer-events: auto;
        }
        .prompt-input {
          grid-area: prompt;
          width: 100%;
          height: 44px;
          min-height: 44px;
          max-height: 112px;
          padding: 10px 12px;
          overflow-y: auto;
          border: 0;
          border-radius: 12px;
          outline: none;
          background: transparent;
          color: var(--ink);
          font: inherit;
          font-size: 16px;
          line-height: 22px;
          resize: none;
          caret-color: var(--beam);
        }
        .prompt-input::placeholder {
          color: var(--muted);
          opacity: 1;
        }
        .prompt-input:focus {
          box-shadow: none;
        }
        .send-prompt {
          grid-area: send;
          background: var(--beam);
          color: oklch(18% 0.024 220);
        }
        .send-prompt:disabled,
        .keys-toggle:disabled,
        .prompt-input:disabled {
          cursor: not-allowed;
          opacity: 0.42;
        }
        .latest-output {
          right: max(10px, env(safe-area-inset-right));
          bottom: calc(70px + env(safe-area-inset-bottom));
          min-height: 44px;
        }
      }

      @media (max-width: 380px) {
        .wordmark {
          letter-spacing: 0.05em;
        }
        .session-label {
          max-width: 31vw;
        }
        .status-text {
          position: absolute;
          width: 1px;
          height: 1px;
          overflow: hidden;
          clip: rect(0, 0, 0, 0);
        }
      }

      @media (prefers-contrast: more) {
        :root {
          --muted: oklch(81% 0.02 230);
          --line: oklch(49% 0.03 235);
        }
        .stage {
          box-shadow: 0 0 0 2px var(--line);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="app" id="app" data-state="initializing">
      <header class="masthead">
        <a class="identity" href="/sessions" aria-label="Back to Scotty sessions">
          <span class="wordmark">SCOTTY</span>
          <span class="session-label" id="session-label">/ identifying</span>
        </a>
        <div class="status-cluster" role="status" aria-live="polite" aria-atomic="true">
          <span class="signal" aria-hidden="true"></span>
          <span class="status-text" id="status-text">Loading terminal</span>
        </div>
        <button class="action" id="action" type="button" hidden>Reconnect</button>
        <span class="transport-line" aria-hidden="true"></span>
      </header>

      <section class="stage" aria-label="Remote Codex terminal">
        <div class="terminal-host" id="terminal" aria-label="Interactive remote terminal"></div>
        <button class="latest-output" id="latest-output" type="button" hidden>Latest ↓</button>
        <div class="veil" id="veil">
          <div class="state-card">
            <div class="state-mark" id="state-mark">ACQUIRING BEAM</div>
            <h1 class="state-title" id="state-title">Connecting to the remote session</h1>
            <p class="state-copy" id="state-copy">
              The terminal will accept input when the secure channel is ready.
            </p>
          </div>
        </div>
      </section>
      <div class="mobile-input" id="mobile-input">
        <div class="terminal-keys" id="terminal-keys" aria-label="Terminal keys" hidden>
          <button class="mobile-key" type="button" data-key="escape">Esc</button>
          <button class="mobile-key" type="button" data-key="tab">Tab</button>
          <button class="mobile-key" type="button" data-key="interrupt">Ctrl-C</button>
          <button class="mobile-key" type="button" data-key="enter">Enter</button>
        </div>
        <form class="prompt-composer" id="prompt-composer">
          <button
            class="composer-button keys-toggle"
            id="keys-toggle"
            type="button"
            aria-label="Show terminal keys"
            aria-controls="terminal-keys"
            aria-expanded="false"
            disabled
          >
            <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M4.75 6.75h14.5v10.5H4.75zM7.5 10h.01m2.99 0h.01m2.99 0h.01m2.99 0h.01M8 14h8"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.6"
              />
            </svg>
          </button>
          <label class="sr-only" for="prompt-input">Write a prompt</label>
          <textarea
            class="prompt-input"
            id="prompt-input"
            rows="1"
            placeholder="Message Codex…"
            autocapitalize="sentences"
            autocorrect="on"
            enterkeyhint="send"
            spellcheck="true"
            disabled
          ></textarea>
          <button
            class="composer-button cancel-prompt"
            id="cancel-prompt"
            type="button"
            aria-label="Dismiss keyboard"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="m7 7 10 10M17 7 7 17"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-width="1.8"
              />
            </svg>
          </button>
          <button
            class="composer-button send-prompt"
            id="send-prompt"
            type="submit"
            aria-label="Send prompt"
            disabled
          >
            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 18V6m0 0-5 5m5-5 5 5"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
              />
            </svg>
          </button>
        </form>
      </div>
      <p class="sr-only" id="announcer" aria-live="assertive"></p>
    </main>

    <script type="module">
      import { FitAddon, Ghostty, Terminal } from "/vendor/ghostty-web/ghostty-web.js";
      import {
        mobileKeyData,
        sgrMouse,
        terminalCell,
        terminalFontSize,
        terminalPrompt,
        visualViewportFrame,
        wheelButton,
        wheelSteps,
      } from "/terminal-input.js";

      const app = document.querySelector("#app");
      const action = document.querySelector("#action");
      const announcer = document.querySelector("#announcer");
      const cancelPrompt = document.querySelector("#cancel-prompt");
      const keysToggle = document.querySelector("#keys-toggle");
      const latestOutput = document.querySelector("#latest-output");
      const mobileInput = document.querySelector("#mobile-input");
      const promptComposer = document.querySelector("#prompt-composer");
      const promptInput = document.querySelector("#prompt-input");
      const sendPrompt = document.querySelector("#send-prompt");
      const sessionLabel = document.querySelector("#session-label");
      const statusText = document.querySelector("#status-text");
      const terminalHost = document.querySelector("#terminal");
      const terminalKeys = document.querySelector("#terminal-keys");
      const veil = document.querySelector("#veil");
      const stateMark = document.querySelector("#state-mark");
      const stateTitle = document.querySelector("#state-title");
      const stateCopy = document.querySelector("#state-copy");

      const route = /^\/s\/([0-9a-f]{12})\/?$/.exec(location.pathname);
      const sessionId = route?.[1];
      const apiId = sessionId ? encodeURIComponent(sessionId) : "";
      const encoder = new TextEncoder();
      const reconnectDelays = [750, 1500, 3000, 6000, 10000, 15000];
      const fontSizeStorageKey = "scotty-terminal-font-size-v2";
      let terminal;
      let fitAddon;
      let socket;
      let ready = false;
      let reconnectAttempt = 0;
      let reconnectTimer;
      let reconnectTicker;
      let reconnectDeadline = 0;
      let heartbeatTimer;
      let activeClientId;
      let intentionalClose = false;
      let currentState = "initializing";
      let lastAnnounced = "";
      let connectGeneration = 0;
      let touchGesture;
      let suppressTouchFocus = false;
      let viewportBaselineWidth = window.visualViewport?.width || window.innerWidth;
      let viewportBaselineHeight = window.visualViewport?.height || window.innerHeight;
      let viewportFitFrame;
      let viewportSettleTimer;
      let viewportFinalTimer;

      function readFontSize() {
        try {
          return terminalFontSize(localStorage.getItem(fontSizeStorageKey), 15);
        } catch {
          return 15;
        }
      }

      let currentFontSize = readFontSize();

      function getTerminalClientId() {
        const bytes = crypto.getRandomValues(new Uint8Array(6));
        return Array.from(bytes, (byte) => byte.toString(16).padStart(2, "0")).join("");
      }

      sessionLabel.textContent = sessionId ? `/ ${sessionId}` : "/ invalid session";
      document.title = sessionId ? `${sessionId} · Scotty` : "Invalid session · Scotty";

      const stateContent = {
        initializing: [
          "LOADING CONSOLE",
          "Preparing the terminal",
          "Loading the local terminal engine.",
        ],
        connecting: [
          "ACQUIRING BEAM",
          "Connecting to the remote session",
          "The terminal will accept input when the secure channel is ready.",
        ],
        reconnecting: [
          "REACQUIRING BEAM",
          "Connection interrupted",
          "The remote process is still owned by Sheppard. Scotty will reattach automatically.",
        ],
        sleeping: [
          "SESSION SLEEPING",
          "The remote session is safely asleep",
          "Its worktree and conversation are checkpointed. Resume it to restore the terminal.",
        ],
        resuming: [
          "RESTORING SESSION",
          "Waking the remote workspace",
          "Scotty is restoring the checkpoint and Codex thread.",
        ],
        failed: [
          "LINK UNAVAILABLE",
          "The terminal could not connect",
          "The session may still be running. Retry the connection when the service is available.",
        ],
        exited: [
          "REMOTE EXIT",
          "The terminal process ended",
          "Reconnect to attach again, or resume if the session has gone to sleep.",
        ],
        offline: [
          "NETWORK OFFLINE",
          "Waiting for a network connection",
          "Scotty will reconnect when this device is back online.",
        ],
        revoked: [
          "ACCESS REVOKED",
          "This browser no longer has access",
          "Open a fresh one-time pairing link from an administrator browser to reconnect.",
        ],
      };

      function announce(message) {
        if (!message || message === lastAnnounced) return;
        lastAnnounced = message;
        announcer.textContent = "";
        requestAnimationFrame(() => {
          announcer.textContent = message;
        });
      }

      function setState(nextState, detail) {
        currentState = nextState;
        app.dataset.state = nextState;

        const content = stateContent[nextState] || stateContent.failed;
        stateMark.textContent = content[0];
        stateTitle.textContent = content[1];
        stateCopy.textContent = content[2];

        const connected = nextState === "connected";
        veil.hidden = connected;
        terminalHost.inert = !connected;
        keysToggle.disabled = !connected;
        promptInput.disabled = !connected;
        if (!connected) {
          promptInput.blur();
          setTerminalKeysOpen(false);
          latestOutput.hidden = true;
        }
        updatePromptState();

        action.hidden = true;
        action.disabled = false;
        if (nextState === "sleeping") {
          action.textContent = "Resume";
          action.hidden = false;
        } else if (nextState === "failed" || nextState === "exited") {
          action.textContent = "Reconnect";
          action.hidden = false;
        } else if (nextState === "resuming") {
          action.textContent = "Resuming";
          action.hidden = false;
          action.disabled = true;
        }

        const labels = {
          initializing: "Loading terminal",
          connecting: "Connecting",
          connected: "Beam locked",
          reconnecting: detail || "Reconnecting",
          sleeping: "Sleeping",
          resuming: "Resuming",
          failed: "Connection failed",
          exited: detail || "Terminal exited",
          offline: "Network offline",
          revoked: "Access revoked",
        };
        statusText.textContent = labels[nextState] || labels.failed;
        announce(statusText.textContent);
      }

      function clearReconnectTimers() {
        clearTimeout(reconnectTimer);
        clearInterval(reconnectTicker);
        reconnectTimer = undefined;
        reconnectTicker = undefined;
      }

      function dimensions(fitRows = true) {
        const proposed = fitAddon.proposeDimensions();
        if (proposed) {
          const cols = Math.max(1, proposed.cols);
          const rows = Math.max(1, fitRows ? proposed.rows : terminal.rows || proposed.rows);
          if (cols !== terminal.cols || rows !== terminal.rows) terminal.resize(cols, rows);
        }
        return {
          cols: Math.max(1, terminal.cols || 80),
          rows: Math.max(1, terminal.rows || 24),
        };
      }

      function websocketUrl(clientId, ticket) {
        const protocol = location.protocol === "https:" ? "wss:" : "ws:";
        const size = dimensions();
        const url = new URL(`${protocol}//${location.host}/api/sessions/${apiId}/pty`);
        url.searchParams.set("client", clientId);
        url.searchParams.set("cols", String(size.cols));
        url.searchParams.set("rows", String(size.rows));
        url.searchParams.set("ticket", ticket);
        return url.href;
      }

      function sendResize(cols = terminal.cols, rows = terminal.rows) {
        if (!ready || socket?.readyState !== WebSocket.OPEN) return;
        if (!Number.isInteger(cols) || !Number.isInteger(rows) || cols < 1 || rows < 1) return;
        socket.send(JSON.stringify({ type: "resize", cols, rows }));
      }

      function sendInput(data) {
        if (!ready || socket?.readyState !== WebSocket.OPEN) return;
        socket.send(encoder.encode(data));
      }

      function setTerminalKeysOpen(open) {
        terminalKeys.hidden = !open;
        keysToggle.setAttribute("aria-expanded", String(open));
        keysToggle.setAttribute("aria-label", open ? "Hide terminal keys" : "Show terminal keys");
      }

      function updatePromptState() {
        sendPrompt.disabled = currentState !== "connected" || !terminalPrompt(promptInput.value);
      }

      function sizePrompt() {
        promptInput.style.height = "0px";
        promptInput.style.height = `${Math.min(112, Math.max(44, promptInput.scrollHeight))}px`;
        updatePromptState();
      }

      function setFontSize(value) {
        const nextFontSize = terminalFontSize(value, currentFontSize);
        currentFontSize = nextFontSize;
        if (!terminal) return;
        terminal.options.fontSize = nextFontSize;
        try {
          localStorage.setItem(fontSizeStorageKey, String(nextFontSize));
        } catch {
          // Private browsing can disable persistent storage; the in-memory setting still works.
        }
        requestAnimationFrame(() => {
          dimensions(true);
          sendResize();
        });
        announce(`Terminal text ${nextFontSize} pixels`);
      }

      function writeTerminalOutput(data) {
        const viewport = terminal.getViewportY();
        const scrollback = terminal.getScrollbackLength();
        terminal.write(data, () => {
          if (viewport <= 0) return;
          const addedLines = Math.max(0, terminal.getScrollbackLength() - scrollback);
          terminal.scrollToLine(Math.min(terminal.getScrollbackLength(), viewport + addedLines));
          latestOutput.hidden = false;
        });
      }

      function submitPrompt() {
        const prompt = terminalPrompt(promptInput.value);
        if (!prompt || currentState !== "connected") return;
        terminal.paste(prompt);
        sendInput(mobileKeyData.enter);
        promptInput.value = "";
        sizePrompt();
        setTerminalKeysOpen(false);
        promptInput.blur();
        announce("Prompt sent");
      }

      function trackedMouseCell(clientX, clientY) {
        const canvas = terminalHost.querySelector("canvas");
        const bounds = (canvas || terminalHost).getBoundingClientRect();
        return terminalCell(bounds, terminal.cols, terminal.rows, clientX, clientY);
      }

      function sendTrackedWheel(deltaY, clientX, clientY, steps = wheelSteps(deltaY)) {
        if (!terminal?.hasMouseTracking() || steps === 0) return false;
        const sequence = sgrMouse(wheelButton(deltaY), trackedMouseCell(clientX, clientY));
        for (let step = 0; step < steps; step += 1) sendInput(sequence);
        return true;
      }

      function sendTrackedClick(clientX, clientY) {
        if (!terminal?.hasMouseTracking()) return false;
        const cell = trackedMouseCell(clientX, clientY);
        sendInput(sgrMouse(0, cell));
        sendInput(sgrMouse(0, cell, true));
        return true;
      }

      function dispatchTerminalWheel(deltaY, clientX, clientY) {
        terminalHost.dispatchEvent(
          new WheelEvent("wheel", {
            bubbles: true,
            cancelable: true,
            clientX,
            clientY,
            deltaMode: WheelEvent.DOM_DELTA_PIXEL,
            deltaY,
          }),
        );
      }

      function closeSocket() {
        connectGeneration += 1;
        intentionalClose = true;
        ready = false;
        clearInterval(heartbeatTimer);
        heartbeatTimer = undefined;
        if (socket && socket.readyState < WebSocket.CLOSING) socket.close(1000, "client reconnect");
        socket = undefined;
      }

      function startHeartbeat(clientId) {
        clearInterval(heartbeatTimer);
        heartbeatTimer = setInterval(() => {
          if (!ready || activeClientId !== clientId) return;
          fetch(`/api/sessions/${apiId}/pty/${clientId}/heartbeat`, {
            method: "POST",
            credentials: "same-origin",
            cache: "no-store",
          })
            .then((response) => {
              if (response.status !== 401 && response.status !== 403) return;
              intentionalClose = true;
              closeSocket();
              setState("revoked");
            })
            .catch(() => undefined);
        }, 15000);
      }

      async function issueTerminalTicket() {
        const response = await fetch(`/api/sessions/${apiId}/pty-ticket`, {
          method: "POST",
          credentials: "same-origin",
          cache: "no-store",
          headers: { Accept: "application/json" },
        });
        if (response.status === 401 || response.status === 403) {
          intentionalClose = true;
          setState("revoked");
          return undefined;
        }
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const body = await response.json();
        if (typeof body?.credential !== "string") throw new Error("Invalid terminal ticket");
        return body.credential;
      }

      async function readSessionStatus() {
        try {
          const response = await fetch(`/api/sessions/${apiId}`, {
            credentials: "same-origin",
            headers: { Accept: "application/json" },
            cache: "no-store",
          });
          if (!response.ok) return undefined;
          const body = await response.json();
          return typeof body?.status === "string" ? body.status : undefined;
        } catch {
          return undefined;
        }
      }

      async function detectSleeping() {
        const status = await readSessionStatus();
        if (status === "sleeping") {
          clearReconnectTimers();
          setState("sleeping");
          return true;
        }
        return false;
      }

      function scheduleReconnect() {
        if (intentionalClose || currentState === "sleeping" || currentState === "resuming") return;
        if (!navigator.onLine) {
          setState("offline");
          return;
        }

        clearReconnectTimers();
        const base = reconnectDelays[Math.min(reconnectAttempt, reconnectDelays.length - 1)];
        const delay = Math.round(base * (0.9 + Math.random() * 0.2));
        reconnectAttempt += 1;
        reconnectDeadline = Date.now() + delay;

        const updateCountdown = () => {
          const seconds = Math.max(1, Math.ceil((reconnectDeadline - Date.now()) / 1000));
          setState("reconnecting", `Reconnecting in ${seconds}s`);
        };
        updateCountdown();
        reconnectTicker = setInterval(updateCountdown, 250);
        reconnectTimer = setTimeout(async () => {
          clearReconnectTimers();
          if (!(await detectSleeping())) connect();
        }, delay);
      }

      function handleControlFrame(payload) {
        let message;
        try {
          message = JSON.parse(payload);
        } catch {
          setState("failed");
          closeSocket();
          return;
        }

        if (message?.type === "ready") {
          ready = true;
          reconnectAttempt = 0;
          clearReconnectTimers();
          setState("connected");
          dimensions();
          sendResize();
          terminal.focus();
          return;
        }

        if (message?.type === "exit") {
          intentionalClose = true;
          ready = false;
          const code = Number.isInteger(message.code) ? ` (code ${message.code})` : "";
          setState("exited", `Terminal exited${code}`);
          return;
        }

        if (message?.type === "error") {
          ready = false;
          const sleeping =
            message.code === "SESSION_SLEEPING" || /sleep/i.test(String(message.message || ""));
          if (sleeping) {
            intentionalClose = true;
            setState("sleeping");
          } else {
            setState("failed");
          }
        }
      }

      async function connect() {
        if (!terminal || !navigator.onLine) {
          setState("offline");
          return;
        }

        closeSocket();
        const generation = connectGeneration;
        intentionalClose = false;
        setState(reconnectAttempt ? "reconnecting" : "connecting");

        try {
          const clientId = getTerminalClientId();
          const ticket = await issueTerminalTicket();
          if (
            !ticket ||
            generation !== connectGeneration ||
            intentionalClose ||
            currentState === "revoked"
          )
            return;
          const connection = new WebSocket(websocketUrl(clientId, ticket));
          socket = connection;
          activeClientId = clientId;
          connection.binaryType = "arraybuffer";
          connection.addEventListener("message", async (event) => {
            // Sandbox can replay buffered binary output before the ready control frame.
            if (event.data instanceof ArrayBuffer) {
              writeTerminalOutput(new Uint8Array(event.data));
              return;
            }
            if (event.data instanceof Blob) {
              writeTerminalOutput(new Uint8Array(await event.data.arrayBuffer()));
              return;
            }
            if (typeof event.data === "string") {
              handleControlFrame(event.data);
              if (ready && socket === connection) startHeartbeat(clientId);
            }
          });
          connection.addEventListener("close", () => {
            if (connection !== socket) return;
            clearInterval(heartbeatTimer);
            heartbeatTimer = undefined;
            activeClientId = undefined;
            ready = false;
            if (!intentionalClose) scheduleReconnect();
          });
          connection.addEventListener("error", () => {
            // close follows error in browsers and owns the reconnect path.
            ready = false;
          });
        } catch {
          setState("failed");
          scheduleReconnect();
          return;
        }
      }

      async function resume() {
        clearReconnectTimers();
        closeSocket();
        setState("resuming");

        try {
          const response = await fetch(`/api/sessions/${apiId}/resume`, {
            method: "POST",
            credentials: "same-origin",
            headers: { Accept: "application/json" },
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const result = await response.json();
          if (result?.status !== "warm") throw new Error("resume failed");
          reconnectAttempt = 0;
          connect();
        } catch {
          setState("failed");
        }
      }

      action.addEventListener("click", () => {
        if (currentState === "sleeping") resume();
        else {
          reconnectAttempt = 0;
          clearReconnectTimers();
          connect();
        }
      });

      terminalHost.addEventListener("pointerdown", (event) => {
        if (currentState !== "connected") return;
        if (event.pointerType !== "touch") {
          terminal.focus();
          return;
        }
        touchGesture = {
          pointerId: event.pointerId,
          startX: event.clientX,
          startY: event.clientY,
          lastY: event.clientY,
          wheelDelta: 0,
          scrolled: false,
          hadComposerFocus: document.activeElement === promptInput,
        };
        if (touchGesture.hadComposerFocus) promptInput.blur();
        terminalHost.setPointerCapture?.(event.pointerId);
        event.preventDefault();
      });

      terminalHost.addEventListener("pointermove", (event) => {
        if (event.pointerType !== "touch" || touchGesture?.pointerId !== event.pointerId) return;
        const deltaY = touchGesture.lastY - event.clientY;
        touchGesture.lastY = event.clientY;
        touchGesture.wheelDelta += deltaY;
        const steps = Math.min(5, Math.floor(Math.abs(touchGesture.wheelDelta) / 28));
        if (steps > 0) {
          const direction = Math.sign(touchGesture.wheelDelta);
          const normalizedDelta = direction * steps * 32;
          if (!sendTrackedWheel(normalizedDelta, event.clientX, event.clientY, steps))
            dispatchTerminalWheel(normalizedDelta, event.clientX, event.clientY);
          touchGesture.wheelDelta -= direction * steps * 28;
          touchGesture.scrolled = true;
        }
        event.preventDefault();
      });

      terminalHost.addEventListener("pointerup", (event) => {
        if (event.pointerType !== "touch" || touchGesture?.pointerId !== event.pointerId) return;
        const moved =
          touchGesture.scrolled ||
          Math.hypot(event.clientX - touchGesture.startX, event.clientY - touchGesture.startY) > 8;
        suppressTouchFocus = moved;
        if (!moved) {
          const tracked = sendTrackedClick(event.clientX, event.clientY);
          if (!tracked && !touchGesture.hadComposerFocus) promptInput.focus();
        }
        terminalHost.releasePointerCapture?.(event.pointerId);
        touchGesture = undefined;
        setTimeout(() => {
          suppressTouchFocus = false;
        }, 0);
        event.preventDefault();
      });

      terminalHost.addEventListener("pointercancel", (event) => {
        if (event.pointerType !== "touch" || touchGesture?.pointerId !== event.pointerId) return;
        suppressTouchFocus = true;
        touchGesture = undefined;
        setTimeout(() => {
          suppressTouchFocus = false;
        }, 0);
      });

      terminalHost.addEventListener(
        "touchend",
        (event) => {
          if (!suppressTouchFocus) return;
          event.preventDefault();
          event.stopImmediatePropagation();
        },
        { capture: true, passive: false },
      );

      keysToggle.addEventListener("pointerdown", (event) => event.preventDefault());
      keysToggle.addEventListener("click", () => setTerminalKeysOpen(terminalKeys.hidden));
      cancelPrompt.addEventListener("pointerdown", (event) => event.preventDefault());
      cancelPrompt.addEventListener("click", () => {
        setTerminalKeysOpen(false);
        promptInput.blur();
      });

      terminalKeys.addEventListener("pointerdown", (event) => event.preventDefault());
      terminalKeys.addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button || currentState !== "connected") return;
        sendInput(mobileKeyData[button.dataset.key] || "");
      });

      latestOutput.addEventListener("click", () => {
        terminal.scrollToBottom();
        latestOutput.hidden = true;
      });

      promptInput.addEventListener("input", sizePrompt);
      promptInput.addEventListener("focus", () => {
        mobileInput.dataset.focused = "true";
        setTerminalKeysOpen(false);
        fitVisualViewport();
      });
      promptInput.addEventListener("blur", () => {
        delete mobileInput.dataset.focused;
        fitVisualViewport();
      });
      promptInput.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" || event.shiftKey || event.isComposing) return;
        event.preventDefault();
        submitPrompt();
      });
      promptComposer.addEventListener("submit", (event) => {
        event.preventDefault();
        submitPrompt();
      });

      window.addEventListener("online", () => {
        reconnectAttempt = 0;
        clearReconnectTimers();
        connect();
      });
      window.addEventListener("offline", () => {
        clearReconnectTimers();
        closeSocket();
        intentionalClose = false;
        setState("offline");
      });
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden && currentState === "connected") {
          dimensions();
          sendResize();
        }
      });
      window.addEventListener("pagehide", () => {
        intentionalClose = true;
        clearReconnectTimers();
        clearInterval(heartbeatTimer);
        if (socket && socket.readyState < WebSocket.CLOSING) socket.close(1000, "page hidden");
        if (activeClientId)
          fetch(`/api/sessions/${apiId}/pty/${activeClientId}`, {
            method: "DELETE",
            credentials: "same-origin",
            keepalive: true,
          }).catch(() => undefined);
      });
      function syncVisualViewport() {
        const viewport = window.visualViewport;
        const width = viewport?.width || window.innerWidth;
        const height = viewport?.height || window.innerHeight;
        const widthChanged = Math.abs(width - viewportBaselineWidth) > 16;
        if (widthChanged) {
          viewportBaselineWidth = width;
          viewportBaselineHeight = height;
        } else if (height > viewportBaselineHeight) {
          viewportBaselineHeight = height;
        }
        const promptFocused = document.activeElement === promptInput;
        const softwareKeyboardOpen =
          mobileLayout.matches &&
          promptFocused &&
          (height < viewportBaselineHeight - 96 || (viewport?.offsetTop || 0) > 0);
        const frame = visualViewportFrame(
          viewport,
          window.innerWidth,
          window.innerHeight,
          softwareKeyboardOpen,
        );
        document.documentElement.style.setProperty("--app-top", `${frame.top}px`);
        document.documentElement.style.setProperty("--app-left", `${frame.left}px`);
        document.documentElement.style.setProperty("--app-width", `${frame.width}px`);
        document.documentElement.style.setProperty("--app-height", `${frame.height}px`);
        app.dataset.keyboard = softwareKeyboardOpen ? "open" : "closed";

        cancelAnimationFrame(viewportFitFrame);
        viewportFitFrame = requestAnimationFrame(() => {
          if (!terminal) return;
          dimensions(!softwareKeyboardOpen);
          sendResize();
        });
      }
      function fitVisualViewport() {
        syncVisualViewport();
        clearTimeout(viewportSettleTimer);
        clearTimeout(viewportFinalTimer);
        viewportSettleTimer = setTimeout(syncVisualViewport, 64);
        viewportFinalTimer = setTimeout(syncVisualViewport, 240);
      }
      window.visualViewport?.addEventListener("resize", fitVisualViewport);
      window.visualViewport?.addEventListener("scroll", fitVisualViewport);
      window.visualViewport?.addEventListener("scrollend", fitVisualViewport);
      window.addEventListener("resize", fitVisualViewport);
      fitVisualViewport();

      if (!sessionId) {
        setState("failed");
        stateTitle.textContent = "This session link is invalid";
        stateCopy.textContent = "Open a canonical /s/ID link from scotty attach ID.";
        action.hidden = true;
      } else {
        try {
          const ghostty = await Ghostty.load("/vendor/ghostty-web/ghostty-vt.wasm");
          terminal = new Terminal({
            ghostty,
            cursorBlink: !matchMedia("(prefers-reduced-motion: reduce)").matches,
            cursorStyle: "block",
            fontFamily:
              '"BerkeleyMono Nerd Font", "Berkeley Mono", "SFMono-Regular", "Cascadia Mono", "Liberation Mono", Consolas, monospace',
            fontSize: currentFontSize,
            scrollback: 6000,
            smoothScrollDuration: matchMedia("(prefers-reduced-motion: reduce)").matches ? 0 : 110,
            theme: {
              background: "#0b1016",
              foreground: "#e8f0f3",
              cursor: "#7bd8e5",
              cursorAccent: "#0b1016",
              selectionBackground: "#214d59",
              selectionForeground: "#f2fbfd",
              black: "#111820",
              red: "#e46e73",
              green: "#86cfad",
              yellow: "#d7bd78",
              blue: "#78a9df",
              magenta: "#b79ad6",
              cyan: "#78c8d3",
              white: "#cdd9df",
              brightBlack: "#7d8d98",
              brightRed: "#f18a8f",
              brightGreen: "#9adfbe",
              brightYellow: "#e6cf8d",
              brightBlue: "#91bceb",
              brightMagenta: "#cab0e2",
              brightCyan: "#93dce5",
              brightWhite: "#f1f6f8",
            },
          });
          fitAddon = new FitAddon();
          terminal.loadAddon(fitAddon);
          terminal.open(terminalHost);
          terminal.attachCustomWheelEventHandler((event) =>
            sendTrackedWheel(event.deltaY, event.clientX, event.clientY),
          );
          terminal.onData((data) => {
            sendInput(data);
          });
          terminal.onResize(({ cols, rows }) => sendResize(cols, rows));
          terminal.onScroll((viewportY) => {
            if (viewportY <= 0) latestOutput.hidden = true;
          });
          setFontSize(currentFontSize);

          requestAnimationFrame(async () => {
            dimensions();
            const status = await readSessionStatus();
            if (status === "sleeping") setState("sleeping");
            else connect();
          });
        } catch {
          setState("failed");
          stateTitle.textContent = "The terminal engine could not load";
          stateCopy.textContent =
            "Reload the page. If the problem continues, verify the bundled Ghostty assets are being served.";
        }
      }
    </script>
  </body>
</html>
