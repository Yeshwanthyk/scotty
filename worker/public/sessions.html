<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#090d12" />
    <meta name="referrer" content="same-origin" />
    <title>Scotty sessions</title>
    <style>
      :root {
        color-scheme: dark;
        --space: oklch(13% 0.012 248);
        --shell: oklch(16% 0.014 248);
        --panel: #0b1016;
        --ink: oklch(93% 0.012 220);
        --muted: oklch(70% 0.025 230);
        --quiet: oklch(53% 0.024 235);
        --line: oklch(30% 0.025 235);
        --beam: oklch(79% 0.115 200);
        --warm: oklch(79% 0.12 78);
        --danger: oklch(70% 0.16 25);
        --focus: oklch(84% 0.13 197);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-synthesis: none;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 280px;
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        background: var(--space);
        color: var(--ink);
      }

      button,
      a {
        font: inherit;
      }

      button {
        color: inherit;
      }

      .masthead {
        border-bottom: 1px solid var(--line);
        background: var(--shell);
      }

      .masthead-inner,
      main {
        width: min(100%, 1120px);
        margin-inline: auto;
      }

      .masthead-inner {
        display: flex;
        min-height: 58px;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: max(7px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) 7px
          max(16px, env(safe-area-inset-left));
      }

      .identity {
        min-width: 0;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .wordmark {
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.09em;
      }

      .section-label {
        margin-left: 10px;
        color: var(--muted);
        font-size: 0.72rem;
      }

      main {
        padding: 28px max(16px, env(safe-area-inset-right)) max(32px, env(safe-area-inset-bottom))
          max(16px, env(safe-area-inset-left));
      }

      .page-heading {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.3rem, 4vw, 1.75rem);
        font-weight: 650;
        letter-spacing: -0.025em;
      }

      .subtitle {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 0.82rem;
      }

      .button {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        padding: 0 15px;
        border: 1px solid var(--line);
        border-radius: 5px;
        background: var(--shell);
        color: var(--ink);
        font-size: 0.78rem;
        font-weight: 680;
        line-height: 1;
        text-decoration: none;
        cursor: pointer;
      }

      .button:hover {
        border-color: var(--quiet);
        background: oklch(19% 0.018 240);
      }

      .button:active {
        translate: 0 1px;
      }

      .button:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
      }

      .button:disabled {
        cursor: wait;
        opacity: 0.55;
      }

      .button-primary {
        border-color: transparent;
        background: var(--beam);
        color: oklch(18% 0.024 220);
      }

      .button-primary:hover {
        border-color: transparent;
        background: oklch(86% 0.12 197);
      }

      .button-danger {
        color: var(--danger);
      }

      .button-danger-confirm {
        border-color: oklch(48% 0.12 25);
        background: oklch(24% 0.055 25);
        color: oklch(84% 0.1 25);
      }

      .notice {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
        padding: 11px 13px;
        border: 1px solid oklch(48% 0.12 25);
        border-radius: 5px;
        background: oklch(19% 0.035 25);
        color: oklch(85% 0.065 25);
        font-size: 0.8rem;
        line-height: 1.45;
      }

      .notice[hidden] {
        display: none;
      }

      .state {
        padding: 56px 20px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--panel);
        color: var(--muted);
        text-align: center;
      }

      .state strong {
        display: block;
        margin-bottom: 6px;
        color: var(--ink);
        font-size: 0.95rem;
      }

      .session-list {
        display: grid;
        gap: 10px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .session {
        display: grid;
        grid-template-columns: minmax(190px, 1.5fr) minmax(150px, 1fr) auto;
        align-items: center;
        gap: 20px;
        min-width: 0;
        padding: 15px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--panel);
        box-shadow: 0 2px 6px oklch(3% 0.01 245 / 0.28);
      }

      .repo,
      .branch,
      .session-id {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .repo {
        margin: 0;
        font-size: 0.95rem;
        font-weight: 650;
      }

      .branch,
      .session-id,
      .metrics {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-variant-numeric: tabular-nums;
      }

      .branch {
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.72rem;
      }

      .session-id {
        margin-top: 5px;
        color: var(--quiet);
        font-size: 0.67rem;
      }

      .status-line {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 7px;
        font-size: 0.76rem;
        font-weight: 650;
        text-transform: capitalize;
      }

      .signal {
        width: 8px;
        height: 8px;
        flex: none;
        border-radius: 50%;
        background: var(--quiet);
        box-shadow: 0 0 0 3px oklch(53% 0.024 235 / 0.12);
      }

      .status-warm .signal {
        background: var(--beam);
      }

      .status-sleeping .signal {
        background: var(--warm);
      }

      .status-failed .signal {
        background: var(--danger);
      }

      .metrics {
        display: flex;
        flex-wrap: wrap;
        gap: 5px 14px;
        color: var(--muted);
        font-size: 0.69rem;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .row-error,
      .confirmation {
        grid-column: 1 / -1;
        margin: -4px 0 0;
        font-size: 0.76rem;
        line-height: 1.45;
      }

      .row-error {
        color: var(--danger);
      }

      .confirmation {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        color: var(--muted);
      }

      @media (max-width: 720px) {
        main {
          padding-top: 20px;
        }

        .session {
          grid-template-columns: 1fr;
          gap: 14px;
        }

        .actions {
          justify-content: stretch;
        }

        .actions .button {
          flex: 1 1 90px;
        }

        .confirmation {
          justify-content: flex-start;
          flex-wrap: wrap;
        }
      }

      @media (max-width: 420px) {
        .page-heading {
          align-items: center;
        }

        .subtitle {
          display: none;
        }

        .section-label {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <header class="masthead">
      <div class="masthead-inner">
        <div class="identity">
          <span class="wordmark">SCOTTY</span><span class="section-label">session control</span>
        </div>
        <button class="button" id="refresh" type="button">Refresh</button>
      </div>
    </header>

    <main>
      <div class="page-heading">
        <div>
          <h1>Sessions</h1>
          <p class="subtitle" id="summary">Your cloud workspaces</p>
        </div>
      </div>

      <div class="notice" id="notice" role="alert" hidden>
        <span id="notice-text"></span>
        <button class="button" id="retry" type="button">Retry</button>
      </div>

      <div id="content" aria-live="polite" aria-busy="true">
        <div class="state"><strong>Loading sessions</strong>Contacting Scotty…</div>
      </div>
    </main>

    <script>
      (() => {
        "use strict";

        const POLL_INTERVAL = 5000;
        const content = document.querySelector("#content");
        const summary = document.querySelector("#summary");
        const notice = document.querySelector("#notice");
        const noticeText = document.querySelector("#notice-text");
        const refreshButton = document.querySelector("#refresh");
        const retryButton = document.querySelector("#retry");
        let sessions = [];
        let loaded = false;
        let fetching = false;
        let pollTimer;
        const busy = new Set();
        const confirmations = new Set();
        const rowErrors = new Map();

        function sessionPath(id, suffix = "") {
          return `/api/sessions/${encodeURIComponent(id)}${suffix}`;
        }

        function duration(value) {
          const seconds = Math.max(0, Number.isFinite(value) ? Math.floor(value) : 0);
          if (seconds < 60) return `${seconds}s`;
          if (seconds < 3600) return `${Math.floor(seconds / 60)}m`;
          if (seconds < 86400)
            return `${Math.floor(seconds / 3600)}h ${Math.floor((seconds % 3600) / 60)}m`;
          return `${Math.floor(seconds / 86400)}d ${Math.floor((seconds % 86400) / 3600)}h`;
        }

        function addText(parent, className, text, tag = "div") {
          const element = document.createElement(tag);
          element.className = className;
          element.textContent = text;
          parent.append(element);
          return element;
        }

        function actionButton(label, action, id, primary = false) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `button${primary ? " button-primary" : ""}`;
          button.dataset.action = action;
          button.dataset.id = id;
          button.disabled = busy.has(id);
          button.textContent = busy.has(id) && action !== "confirm-delete" ? "Working…" : label;
          return button;
        }

        function render() {
          content.replaceChildren();
          content.setAttribute("aria-busy", fetching ? "true" : "false");
          summary.textContent = loaded
            ? `${sessions.length} ${sessions.length === 1 ? "workspace" : "workspaces"}`
            : "Your cloud workspaces";

          if (!loaded) {
            const state = addText(content, "state", "Contacting Scotty…");
            addText(state, "", "Loading sessions", "strong");
            state.prepend(state.lastChild);
            return;
          }

          if (sessions.length === 0) {
            const state = addText(
              content,
              "state",
              "New sessions created with Scotty will appear here.",
            );
            addText(state, "", "No sessions", "strong");
            state.prepend(state.lastChild);
            return;
          }

          const list = document.createElement("ul");
          list.className = "session-list";
          list.setAttribute("aria-label", "Scotty sessions");

          for (const session of sessions) {
            const item = document.createElement("li");
            const status = typeof session.status === "string" ? session.status : "unknown";
            item.className = `session status-${status}`;

            const identity = document.createElement("div");
            addText(identity, "repo", session.repo || "Unknown repository", "h2");
            addText(identity, "branch", session.branch || session.defaultBranch || "No branch");
            addText(identity, "session-id", session.id);
            item.append(identity);

            const details = document.createElement("div");
            const statusLine = document.createElement("div");
            statusLine.className = "status-line";
            const signal = document.createElement("span");
            signal.className = "signal";
            signal.setAttribute("aria-hidden", "true");
            statusLine.append(signal, document.createTextNode(status));
            details.append(statusLine);
            const metrics = document.createElement("div");
            metrics.className = "metrics";
            addText(metrics, "", `age ${duration(session.ageSeconds)}`, "span");
            addText(metrics, "", `cap ${duration(session.capRemainingSeconds)} left`, "span");
            details.append(metrics);
            item.append(details);

            const actions = document.createElement("div");
            actions.className = "actions";
            if (status === "warm") {
              const open = document.createElement("a");
              open.className = "button button-primary";
              open.href = `/s/${encodeURIComponent(session.id)}`;
              open.textContent = "Open";
              actions.append(open, actionButton("Stop", "sleep", session.id));
            } else if (status === "sleeping" || (status === "failed" && session.backupId)) {
              actions.append(actionButton("Resume & open", "resume", session.id, true));
            }
            const deleteButton = actionButton("Delete", "confirm-delete", session.id);
            deleteButton.classList.add("button-danger");
            actions.append(deleteButton);
            item.append(actions);

            if (confirmations.has(session.id)) {
              const confirmation = document.createElement("div");
              confirmation.className = "confirmation";
              addText(confirmation, "", "Permanently delete this session and its backups?", "span");
              const confirmButton = actionButton("Delete permanently", "delete", session.id);
              confirmButton.classList.add("button-danger-confirm");
              confirmation.append(
                confirmButton,
                actionButton("Cancel", "cancel-delete", session.id),
              );
              item.append(confirmation);
            }

            if (rowErrors.has(session.id)) {
              const error = addText(item, "row-error", rowErrors.get(session.id));
              error.setAttribute("role", "alert");
            }
            list.append(item);
          }
          content.append(list);
        }

        async function errorMessage(response, fallback) {
          try {
            const body = await response.json();
            return body?.error?.message || body?.message || fallback;
          } catch {
            return fallback;
          }
        }

        async function refresh(options = {}) {
          if (fetching) return;
          fetching = true;
          refreshButton.disabled = true;
          if (!loaded) render();
          try {
            const response = await fetch("/api/sessions", {
              credentials: "same-origin",
              cache: "no-store",
              headers: { Accept: "application/json" },
            });
            if (!response.ok)
              throw new Error(await errorMessage(response, "Sessions could not be loaded."));
            const body = await response.json();
            const next = Array.isArray(body) ? body : body?.sessions;
            if (!Array.isArray(next)) throw new Error("Scotty returned an unexpected response.");
            sessions = next.filter(
              (session) => session && typeof session === "object" && typeof session.id === "string",
            );
            loaded = true;
            notice.hidden = true;
          } catch (error) {
            noticeText.textContent =
              error instanceof Error ? error.message : "Sessions could not be loaded.";
            notice.hidden = false;
            if (options.actionId) rowErrors.set(options.actionId, noticeText.textContent);
          } finally {
            fetching = false;
            refreshButton.disabled = false;
            render();
          }
        }

        async function perform(id, action) {
          if (busy.has(id)) return;
          busy.add(id);
          rowErrors.delete(id);
          render();
          const suffix = action === "delete" ? "" : `/${action}`;
          const method = action === "delete" ? "DELETE" : "POST";
          let succeeded = false;
          try {
            const response = await fetch(sessionPath(id, suffix), {
              method,
              credentials: "same-origin",
              cache: "no-store",
              headers: { Accept: "application/json" },
            });
            if (!response.ok) {
              throw new Error(await errorMessage(response, `Could not ${action} this session.`));
            }
            const result = await response.json();
            const expectedStatus =
              action === "delete" ? "gone" : action === "sleep" ? "sleeping" : "warm";
            if (result?.id !== id || result?.status !== expectedStatus)
              throw new Error("Scotty returned an unexpected response.");
            succeeded = true;
            confirmations.delete(id);
            if (action === "resume") {
              window.location.assign(`/s/${encodeURIComponent(id)}`);
              return;
            }
            if (action === "delete") sessions = sessions.filter((session) => session.id !== id);
            else
              sessions = sessions.map((session) =>
                session.id === id ? { ...session, ...result } : session,
              );
          } catch (error) {
            rowErrors.set(
              id,
              error instanceof Error ? error.message : `Could not ${action} this session.`,
            );
          } finally {
            busy.delete(id);
            if (succeeded) render();
            else await refresh({ actionId: id });
          }
        }

        content.addEventListener("click", (event) => {
          const button = event.target.closest("button[data-action]");
          if (!button) return;
          const { action, id } = button.dataset;
          if (action === "confirm-delete") {
            confirmations.add(id);
            render();
            content.querySelector(`[data-action="delete"][data-id="${CSS.escape(id)}"]`)?.focus();
          } else if (action === "cancel-delete") {
            confirmations.delete(id);
            render();
          } else {
            void perform(id, action);
          }
        });

        function schedulePoll() {
          clearInterval(pollTimer);
          if (!document.hidden) pollTimer = setInterval(() => void refresh(), POLL_INTERVAL);
        }

        document.addEventListener("visibilitychange", () => {
          schedulePoll();
          if (!document.hidden) void refresh();
        });
        refreshButton.addEventListener("click", () => void refresh());
        retryButton.addEventListener("click", () => void refresh());

        schedulePoll();
        void refresh();
      })();
    </script>
  </body>
</html>
