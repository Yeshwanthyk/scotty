<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#090d12" />
    <meta name="referrer" content="same-origin" />
    <title>Scotty sessions</title>
    <style>
      :root {
        color-scheme: dark;
        --space: oklch(13% 0.012 248);
        --shell: oklch(16% 0.014 248);
        --panel: #0b1016;
        --panel-raised: oklch(17.5% 0.018 245);
        --control: oklch(11.5% 0.012 245);
        --ink: oklch(93% 0.012 220);
        --muted: oklch(70% 0.025 230);
        --quiet: oklch(53% 0.024 235);
        --line: oklch(30% 0.025 235);
        --line-soft: oklch(93% 0.012 220 / 0.075);
        --line-hover: oklch(93% 0.012 220 / 0.14);
        --beam: oklch(79% 0.115 200);
        --warm: oklch(79% 0.12 78);
        --danger: oklch(70% 0.16 25);
        --focus: oklch(84% 0.13 197);
        --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
        --ring: 0 0 0 1px var(--line-soft);
        --ring-hover: 0 0 0 1px var(--line-hover);
        --z-sticky: 10;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-synthesis: none;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 280px;
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        background:
          radial-gradient(90% 44% at 50% -16%, oklch(34% 0.055 220 / 0.16), transparent 72%),
          var(--space);
        color: var(--ink);
      }

      button,
      a,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        color: inherit;
      }

      .masthead {
        position: sticky;
        z-index: var(--z-sticky);
        top: 0;
        background: oklch(16% 0.014 248 / 0.96);
        box-shadow: 0 1px 0 var(--line-soft);
      }

      .masthead-inner,
      main {
        width: min(100%, 1120px);
        margin-inline: auto;
      }

      .masthead-inner {
        display: flex;
        min-height: 58px;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: max(7px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) 7px
          max(16px, env(safe-area-inset-left));
      }

      .masthead-actions {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .masthead-actions .button {
        min-height: 40px;
        padding-inline: 11px;
        background: transparent;
        box-shadow: none;
        color: var(--muted);
      }

      .masthead-actions .button:hover {
        background: oklch(93% 0.012 220 / 0.05);
        box-shadow: none;
        color: var(--ink);
      }

      .identity {
        min-width: 0;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .wordmark {
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.09em;
      }

      .section-label {
        margin-left: 10px;
        color: var(--muted);
        font-size: 0.72rem;
      }

      main {
        padding: 32px max(16px, env(safe-area-inset-right)) max(40px, env(safe-area-inset-bottom))
          max(16px, env(safe-area-inset-left));
      }

      .page-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0;
        font-size: 1.75rem;
        font-weight: 650;
        letter-spacing: -0.025em;
        line-height: 1.1;
        text-wrap: balance;
      }

      .subtitle {
        margin: 7px 0 0;
        color: var(--muted);
        font-size: 0.84rem;
      }

      .button {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        padding: 0 15px;
        border: 0;
        border-radius: 6px;
        background: var(--panel-raised);
        box-shadow: var(--ring);
        color: var(--ink);
        font-size: 0.78rem;
        font-weight: 680;
        line-height: 1;
        text-decoration: none;
        cursor: pointer;
        transition:
          scale 120ms var(--ease-out),
          box-shadow 150ms var(--ease-out),
          background-color 150ms var(--ease-out),
          color 150ms var(--ease-out),
          opacity 150ms var(--ease-out);
      }

      .button:hover {
        background: oklch(20% 0.02 240);
        box-shadow: var(--ring-hover);
      }

      .button:active {
        scale: 0.96;
      }

      .button:focus-visible {
        outline: 1px solid var(--focus);
        outline-offset: 2px;
      }

      .button:disabled {
        cursor: wait;
        opacity: 0.55;
      }

      .button-primary {
        background: var(--beam);
        box-shadow:
          0 0 0 1px oklch(94% 0.03 200 / 0.12),
          0 2px 6px oklch(3% 0.01 245 / 0.34);
        color: oklch(18% 0.024 220);
      }

      .button-primary:hover {
        background: oklch(86% 0.12 197);
        box-shadow:
          0 0 0 1px oklch(94% 0.03 200 / 0.18),
          0 3px 8px oklch(3% 0.01 245 / 0.42);
      }

      .has-no-sessions .page-heading .button-primary {
        background: transparent;
        box-shadow: var(--ring);
        color: var(--muted);
      }

      .has-no-sessions .page-heading .button-primary:hover {
        background: oklch(93% 0.012 220 / 0.05);
        box-shadow: var(--ring-hover);
        color: var(--ink);
      }

      .button-quiet {
        background: transparent;
        box-shadow: none;
        color: var(--muted);
      }

      .button-quiet:hover {
        background: oklch(93% 0.012 220 / 0.05);
        box-shadow: none;
        color: var(--ink);
      }

      .button-danger {
        background: transparent;
        box-shadow: none;
        color: var(--danger);
      }

      .button-danger:hover {
        background: oklch(70% 0.16 25 / 0.08);
        box-shadow: none;
        color: oklch(78% 0.14 25);
      }

      .button-danger-confirm {
        background: oklch(24% 0.055 25);
        box-shadow: 0 0 0 1px oklch(58% 0.13 25 / 0.7);
        color: oklch(84% 0.1 25);
      }

      .button-danger-confirm:hover {
        background: oklch(28% 0.065 25);
        box-shadow: 0 0 0 1px oklch(66% 0.14 25 / 0.75);
        color: oklch(89% 0.08 25);
      }

      .notice {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
        padding: 11px 13px;
        border: 1px solid oklch(48% 0.12 25);
        border-radius: 5px;
        background: oklch(19% 0.035 25);
        color: oklch(85% 0.065 25);
        font-size: 0.8rem;
        line-height: 1.45;
      }

      .notice[hidden] {
        display: none;
      }

      .composer-region {
        display: grid;
        grid-template-rows: 0fr;
        margin-bottom: 0;
        opacity: 0;
        transition:
          grid-template-rows 200ms var(--ease-out),
          margin-bottom 200ms var(--ease-out),
          opacity 140ms var(--ease-out);
      }

      .composer-region.is-open {
        grid-template-rows: 1fr;
        margin-bottom: 18px;
        opacity: 1;
      }

      .composer-clip {
        min-height: 0;
        overflow: hidden;
      }

      .composer {
        padding: 20px;
        border: 0;
        border-radius: 12px;
        background: oklch(15% 0.016 245);
        box-shadow:
          0 0 0 1px oklch(79% 0.115 200 / 0.2),
          0 4px 8px oklch(3% 0.01 245 / 0.34);
        transform: translateY(-6px) scale(0.995);
        transform-origin: 50% 0;
        transition:
          box-shadow 180ms var(--ease-out),
          transform 200ms var(--ease-out);
      }

      .composer-region.is-open .composer {
        transform: translateY(0) scale(1);
      }

      .composer-heading {
        margin-bottom: 20px;
      }

      .composer-heading h2 {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: -0.015em;
        line-height: 1.3;
        text-wrap: balance;
      }

      .composer-heading p {
        max-width: 68ch;
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.8rem;
        line-height: 1.5;
        text-wrap: pretty;
      }

      .composer-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 180px;
        gap: 16px;
      }

      .field {
        display: grid;
        min-width: 0;
        align-content: start;
        gap: 8px;
      }

      .field-prompt {
        margin-top: 18px;
      }

      .field label {
        color: oklch(78% 0.02 230);
        font-size: 0.75rem;
        font-weight: 680;
      }

      .field-hint {
        color: var(--quiet);
        font-size: 0.72rem;
        line-height: 1.45;
        text-wrap: pretty;
      }

      .control {
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 6px;
        outline: none;
        background: var(--control);
        color: var(--ink);
        transition:
          border-color 150ms var(--ease-out),
          box-shadow 150ms var(--ease-out),
          background-color 150ms var(--ease-out);
      }

      input.control,
      select.control {
        padding: 0 12px;
      }

      textarea.control {
        min-height: 144px;
        resize: vertical;
        padding: 12px 13px;
        line-height: 1.55;
      }

      .control::placeholder {
        color: oklch(66% 0.022 235);
      }

      .control:hover:not(:disabled) {
        border-color: oklch(44% 0.03 230);
        background: oklch(12.5% 0.014 245);
      }

      .control:focus {
        border-color: var(--focus);
        box-shadow: 0 0 0 3px oklch(84% 0.13 197 / 0.14);
      }

      .control:disabled {
        cursor: wait;
        opacity: 0.58;
      }

      .recent-repos {
        display: flex;
        min-height: 40px;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      .recent-repositories[hidden] {
        display: none;
      }

      .recent-repositories {
        display: grid;
        gap: 7px;
        margin-top: 2px;
      }

      .recent-label {
        color: var(--quiet);
        font-size: 0.69rem;
        font-weight: 650;
      }

      .repo-suggestion {
        display: inline-flex;
        max-width: 100%;
        min-height: 40px;
        min-width: 0;
        align-items: center;
        gap: 9px;
        flex: none;
        padding: 0 10px;
        border: 0;
        border-radius: 6px;
        background: var(--panel-raised);
        box-shadow: var(--ring);
        color: var(--muted);
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 0.7rem;
        line-height: 1.2;
        cursor: pointer;
        transition:
          background-color 150ms var(--ease-out),
          box-shadow 150ms var(--ease-out),
          color 150ms var(--ease-out),
          scale 120ms var(--ease-out);
      }

      .repo-suggestion:hover {
        background: oklch(20% 0.02 240);
        box-shadow: var(--ring-hover);
        color: var(--ink);
      }

      .repo-suggestion:active {
        scale: 0.96;
      }

      .repo-suggestion:focus-visible {
        outline: 1px solid var(--focus);
        outline-offset: 2px;
      }

      .repo-suggestion:disabled {
        cursor: wait;
        opacity: 0.5;
      }

      .repo-suggestion-name {
        min-width: 0;
        overflow: hidden;
        color: inherit;
        font-weight: 680;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .repo-suggestion-branch {
        flex: none;
        padding: 3px 5px;
        border-radius: 4px;
        background: oklch(11% 0.012 245 / 0.7);
        color: var(--quiet);
        font-size: 0.65rem;
      }

      .composer-footer {
        display: flex;
        min-height: 44px;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin-top: 18px;
      }

      .composer-feedback {
        min-width: 0;
        color: var(--muted);
        font-size: 0.75rem;
        line-height: 1.45;
      }

      .composer-feedback:empty {
        display: none;
      }

      .composer-feedback.is-pending {
        color: var(--beam);
      }

      .composer-feedback.is-error {
        color: oklch(84% 0.1 25);
      }

      .composer-feedback strong {
        display: block;
        color: var(--danger);
        font-weight: 680;
      }

      .composer-actions {
        display: flex;
        flex: none;
        gap: 8px;
        margin-left: auto;
      }

      .shortcut {
        margin-left: 7px;
        padding: 3px 5px;
        border-radius: 4px;
        background: oklch(18% 0.024 220 / 0.11);
        color: oklch(24% 0.028 220);
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 0.67rem;
        font-weight: 700;
      }

      .state {
        padding: 44px 24px;
        border: 0;
        border-radius: 10px;
        background:
          radial-gradient(48% 80% at 50% 0%, oklch(79% 0.115 200 / 0.045), transparent 100%),
          var(--panel);
        box-shadow:
          var(--ring),
          0 3px 8px oklch(3% 0.01 245 / 0.2);
        color: var(--muted);
        text-align: center;
      }

      .state-empty::before {
        content: ">_";
        display: grid;
        width: 36px;
        height: 36px;
        place-items: center;
        margin: 0 auto 18px;
        border-radius: 8px;
        background: oklch(79% 0.115 200 / 0.08);
        box-shadow: 0 0 0 1px oklch(79% 0.115 200 / 0.16);
        color: var(--beam);
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 0.72rem;
        font-weight: 700;
      }

      .state strong {
        display: block;
        margin-bottom: 8px;
        color: var(--ink);
        font-size: 1.05rem;
        letter-spacing: -0.012em;
        text-wrap: balance;
      }

      .state-copy {
        max-width: 58ch;
        margin: 0 auto;
        line-height: 1.55;
        text-wrap: pretty;
      }

      .state .button {
        display: flex;
        width: max-content;
        margin: 22px auto 0;
      }

      .composer-open #content .state {
        display: none;
      }

      .session-list {
        display: grid;
        gap: 10px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .session {
        display: grid;
        grid-template-columns: minmax(190px, 1.5fr) minmax(150px, 1fr) auto;
        align-items: center;
        gap: 24px;
        min-width: 0;
        padding: 17px 18px;
        border: 0;
        border-radius: 10px;
        background: var(--panel);
        box-shadow:
          var(--ring),
          0 2px 6px oklch(3% 0.01 245 / 0.24);
        transition:
          background-color 160ms var(--ease-out),
          box-shadow 160ms var(--ease-out);
      }

      .session:hover {
        background: oklch(15.5% 0.017 245);
        box-shadow:
          var(--ring-hover),
          0 3px 8px oklch(3% 0.01 245 / 0.3);
      }

      .repo,
      .branch,
      .session-id {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .repo {
        margin: 0;
        font-size: 0.98rem;
        font-weight: 680;
        letter-spacing: -0.01em;
        line-height: 1.3;
        text-wrap: balance;
      }

      .branch,
      .session-id,
      .metrics {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-variant-numeric: tabular-nums;
      }

      .branch {
        min-width: 0;
        color: var(--muted);
        font-size: 0.73rem;
      }

      .session-id {
        flex: none;
        color: var(--quiet);
        font-size: 0.68rem;
      }

      .identity-meta {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 8px;
        margin-top: 6px;
      }

      .identity-separator {
        width: 3px;
        height: 3px;
        flex: none;
        border-radius: 50%;
        background: var(--quiet);
      }

      .status-line {
        display: inline-flex;
        min-height: 28px;
        align-items: center;
        gap: 7px;
        margin-bottom: 8px;
        padding: 0 9px;
        border-radius: 999px;
        background: oklch(53% 0.024 235 / 0.09);
        color: var(--muted);
        font-size: 0.73rem;
        font-weight: 680;
        text-transform: capitalize;
      }

      .signal {
        width: 8px;
        height: 8px;
        flex: none;
        border-radius: 50%;
        background: var(--quiet);
        box-shadow: 0 0 0 3px oklch(53% 0.024 235 / 0.12);
      }

      .status-warm .status-line {
        background: oklch(79% 0.115 200 / 0.09);
        color: var(--beam);
      }

      .status-warm .signal {
        background: var(--beam);
      }

      .status-sleeping .status-line {
        background: oklch(79% 0.12 78 / 0.09);
        color: var(--warm);
      }

      .status-sleeping .signal {
        background: var(--warm);
      }

      .status-stopping .status-line {
        background: oklch(79% 0.12 78 / 0.09);
        color: var(--warm);
      }

      .status-stopping .signal {
        background: var(--warm);
      }

      .status-failed .status-line {
        background: oklch(70% 0.16 25 / 0.09);
        color: var(--danger);
      }

      .status-failed .signal {
        background: var(--danger);
      }

      .metrics {
        display: flex;
        flex-wrap: wrap;
        gap: 5px 12px;
        color: var(--muted);
        font-size: 0.7rem;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
      }

      .actions .button {
        min-height: 40px;
        padding-inline: 13px;
      }

      .row-error,
      .confirmation {
        grid-column: 1 / -1;
        margin: -2px 0 0;
        font-size: 0.76rem;
        line-height: 1.45;
      }

      .row-error {
        color: var(--danger);
      }

      .confirmation {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        padding: 12px;
        border-radius: 8px;
        background: oklch(20% 0.035 25);
        box-shadow: 0 0 0 1px oklch(58% 0.13 25 / 0.35);
        color: var(--muted);
      }

      @media (max-width: 720px) {
        main {
          padding-top: 24px;
        }

        h1 {
          font-size: 1.5rem;
        }

        .session {
          grid-template-columns: 1fr;
          gap: 16px;
          padding: 16px;
        }

        .actions {
          justify-content: flex-end;
        }

        .confirmation {
          justify-content: flex-start;
          flex-wrap: wrap;
        }

        .composer {
          padding: 16px;
          border-radius: 10px;
        }

        .composer-heading p {
          font-size: 0.875rem;
        }

        .field label,
        .field-hint,
        .branch,
        .session-id,
        .metrics,
        .status-line {
          font-size: 0.78rem;
        }

        .repo-suggestion {
          font-size: 0.78rem;
        }

        .composer-footer {
          align-items: stretch;
          flex-direction: column;
          gap: 12px;
        }

        .composer-actions {
          width: 100%;
          justify-content: flex-end;
          margin-left: 0;
        }

        .shortcut {
          display: none;
        }
      }

      @media (max-width: 560px) {
        .composer-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 420px) {
        .page-heading {
          align-items: center;
        }

        .subtitle {
          display: none;
        }

        .section-label {
          display: none;
        }

        .page-heading .button {
          padding-inline: 12px;
        }

        .recent-repos {
          align-items: stretch;
          flex-direction: column;
        }

        .repo-suggestion {
          justify-content: space-between;
          width: 100%;
        }

        .repo-suggestion:nth-child(n + 4) {
          display: none;
        }

        .notice {
          align-items: flex-start;
          flex-direction: column;
        }

        .confirmation-copy {
          flex-basis: 100%;
        }

        .state {
          padding: 40px 20px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .composer-region {
          transition: none;
        }

        .composer,
        .session,
        .repo-suggestion {
          transition: none;
          transform: none;
        }

        .button:active {
          scale: none;
        }

        .repo-suggestion:active {
          scale: none;
        }
      }
    </style>
  </head>
  <body>
    <header class="masthead">
      <div class="masthead-inner">
        <div class="identity">
          <span class="wordmark">SCOTTY</span><span class="section-label">session control</span>
        </div>
        <div class="masthead-actions">
          <a class="button" id="devices" href="/devices" hidden>Devices</a>
          <button class="button" id="refresh" type="button">Refresh</button>
        </div>
      </div>
    </header>

    <main>
      <div class="page-heading">
        <div>
          <h1>Sessions</h1>
          <p class="subtitle" id="summary">Your cloud workspaces</p>
        </div>
        <button
          class="button button-primary"
          id="new-session"
          type="button"
          aria-expanded="false"
          aria-controls="new-session-region"
        >
          New session
        </button>
      </div>

      <div class="composer-region" id="new-session-region" aria-hidden="true" inert>
        <div class="composer-clip">
          <form class="composer" id="new-session-form">
            <div class="composer-heading">
              <h2>Start a cloud workspace</h2>
              <p>
                Scotty fetches the repository, creates a session branch, and launches Codex with
                your prompt.
              </p>
            </div>

            <div class="composer-grid">
              <div class="field">
                <label for="session-repo">Repository</label>
                <input
                  class="control"
                  id="session-repo"
                  name="repo"
                  type="text"
                  placeholder="owner/repository"
                  autocomplete="off"
                  autocapitalize="none"
                  spellcheck="false"
                  required
                />
                <div class="recent-repositories" id="recent-repositories" hidden>
                  <span class="recent-label">Recent repositories</span>
                  <div class="recent-repos" id="recent-repos"></div>
                </div>
              </div>

              <div class="field">
                <label for="session-cap">Session limit</label>
                <select class="control" id="session-cap" name="hardCapSeconds">
                  <option value="3600">1 hour</option>
                  <option value="14400" selected>4 hours</option>
                  <option value="28800">8 hours</option>
                  <option value="43200">12 hours</option>
                </select>
                <span class="field-hint">Checkpoints and sleeps the workspace at this limit.</span>
              </div>
            </div>

            <div class="field field-prompt">
              <label for="session-prompt">What should Codex do?</label>
              <textarea
                class="control"
                id="session-prompt"
                name="prompt"
                placeholder="Describe the outcome, important context, and how you want it verified."
                required
              ></textarea>
            </div>

            <div class="composer-footer">
              <div class="composer-feedback" id="composer-feedback" role="status"></div>
              <div class="composer-actions">
                <button class="button button-quiet" id="cancel-session" type="button">
                  Cancel
                </button>
                <button class="button button-primary" id="start-session" type="submit">
                  <span id="start-session-label">Start session</span>
                  <kbd class="shortcut" id="start-session-shortcut">⌘↵</kbd>
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <div class="notice" id="notice" role="alert" hidden>
        <span id="notice-text"></span>
        <button class="button" id="retry" type="button">Retry</button>
      </div>

      <div id="content" aria-live="polite" aria-busy="true">
        <div class="state"><strong>Loading sessions</strong>Contacting Scotty…</div>
      </div>
    </main>

    <script type="module">
      import {
        mergeRepositorySuggestions,
        promptText,
        repositoryName,
        safeSessionPath,
        sessionDisplayStatus,
        submissionIdentity,
      } from "/session-form.js";

      const POLL_INTERVAL = 5000;
      const content = document.querySelector("#content");
      const devicesLink = document.querySelector("#devices");
      const summary = document.querySelector("#summary");
      const notice = document.querySelector("#notice");
      const noticeText = document.querySelector("#notice-text");
      const refreshButton = document.querySelector("#refresh");
      const retryButton = document.querySelector("#retry");
      const newSessionButton = document.querySelector("#new-session");
      const composerRegion = document.querySelector("#new-session-region");
      const sessionForm = document.querySelector("#new-session-form");
      const repoInput = document.querySelector("#session-repo");
      const capSelect = document.querySelector("#session-cap");
      const promptInput = document.querySelector("#session-prompt");
      const recentRepositories = document.querySelector("#recent-repositories");
      const recentRepos = document.querySelector("#recent-repos");
      const composerFeedback = document.querySelector("#composer-feedback");
      const cancelSessionButton = document.querySelector("#cancel-session");
      const startSessionButton = document.querySelector("#start-session");
      const startSessionLabel = document.querySelector("#start-session-label");
      const startSessionShortcut = document.querySelector("#start-session-shortcut");
      let sessions = [];
      let trackedRepositories = [];
      let loaded = false;
      let fetching = false;
      let creating = false;
      let createController;
      let createAbortReason;
      let lastSubmission;
      let pollTimer;
      const busy = new Map();
      const confirmations = new Set();
      const rowErrors = new Map();

      function sessionPath(id, suffix = "") {
        return `/api/sessions/${encodeURIComponent(id)}${suffix}`;
      }

      function duration(value) {
        const seconds = Math.max(0, Number.isFinite(value) ? Math.floor(value) : 0);
        if (seconds < 60) return `${seconds}s`;
        if (seconds < 3600) return `${Math.floor(seconds / 60)}m`;
        if (seconds < 86400)
          return `${Math.floor(seconds / 3600)}h ${Math.floor((seconds % 3600) / 60)}m`;
        return `${Math.floor(seconds / 86400)}d ${Math.floor((seconds % 86400) / 3600)}h`;
      }

      function addText(parent, className, text, tag = "div") {
        const element = document.createElement(tag);
        element.className = className;
        element.textContent = text;
        parent.append(element);
        return element;
      }

      function setComposerOpen(open) {
        document.body.classList.toggle("composer-open", open);
        composerRegion.classList.toggle("is-open", open);
        composerRegion.toggleAttribute("inert", !open);
        composerRegion.setAttribute("aria-hidden", open ? "false" : "true");
        newSessionButton.setAttribute("aria-expanded", open ? "true" : "false");
        newSessionButton.textContent = open ? "Close" : "New session";
        newSessionButton.classList.toggle("button-primary", !open);
        if (open) requestAnimationFrame(() => repoInput.focus());
        else newSessionButton.focus();
      }

      function setComposerFeedback(kind, message, hint) {
        composerFeedback.replaceChildren();
        composerFeedback.className = `composer-feedback${kind ? ` is-${kind}` : ""}`;
        if (!message) return;
        if (kind === "error") addText(composerFeedback, "", message, "strong");
        else composerFeedback.append(document.createTextNode(message));
        if (hint) addText(composerFeedback, "", hint, "span");
      }

      function setCreating(next) {
        creating = next;
        for (const element of sessionForm.elements) {
          if (element !== cancelSessionButton) element.disabled = next;
        }
        for (const button of recentRepos.querySelectorAll("button")) button.disabled = next;
        cancelSessionButton.textContent = next ? "Cancel start" : "Cancel";
        startSessionLabel.textContent = next ? "Starting…" : "Start session";
        startSessionShortcut.hidden = next;
      }

      function abortCreate(reason) {
        if (!creating || !createController) return;
        createAbortReason = reason;
        createController.abort();
      }

      function renderRepositorySuggestions() {
        const repositories = mergeRepositorySuggestions(trackedRepositories, sessions);
        recentRepos.replaceChildren();
        recentRepositories.hidden = repositories.length === 0;
        for (const repository of repositories.slice(0, 5)) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "repo-suggestion";
          button.title = repository.defaultBranch
            ? `${repository.repo} · default branch ${repository.defaultBranch}`
            : repository.repo;
          addText(button, "repo-suggestion-name", repository.repo, "span");
          if (repository.defaultBranch)
            addText(button, "repo-suggestion-branch", repository.defaultBranch, "span");
          button.disabled = creating;
          button.addEventListener("click", () => {
            repoInput.value = repository.repo;
            repoInput.setCustomValidity("");
            if (composerFeedback.classList.contains("is-error")) setComposerFeedback();
            promptInput.focus();
          });
          recentRepos.append(button);
        }
      }

      function actionButton(label, action, id, primary = false) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `button${primary ? " button-primary" : ""}`;
        button.dataset.action = action;
        button.dataset.id = id;
        button.dataset.focusKey = `${action}:${id}`;
        button.disabled = busy.has(id);
        const pendingAction = busy.get(id);
        button.textContent =
          pendingAction === "sleep" && action === "sleep"
            ? "Stopping…"
            : pendingAction && action !== "confirm-delete"
              ? "Working…"
              : label;
        return button;
      }

      function render() {
        const activeElement = document.activeElement;
        const focusKey =
          activeElement instanceof HTMLElement && content.contains(activeElement)
            ? activeElement.dataset.focusKey
            : undefined;
        content.replaceChildren();
        content.setAttribute("aria-busy", fetching ? "true" : "false");
        document.body.classList.toggle("has-no-sessions", loaded && sessions.length === 0);
        summary.textContent = loaded
          ? `${sessions.length} ${sessions.length === 1 ? "workspace" : "workspaces"}`
          : "Your cloud workspaces";

        if (!loaded) {
          const state = document.createElement("div");
          state.className = "state";
          addText(state, "", "Loading sessions", "strong");
          addText(state, "state-copy", "Contacting Scotty…", "p");
          content.append(state);
          return;
        }

        if (sessions.length === 0) {
          const state = document.createElement("div");
          state.className = "state state-empty";
          addText(state, "", "No cloud workspaces yet", "strong");
          addText(
            state,
            "state-copy",
            "Start with a repository and tell Codex what outcome you want.",
            "p",
          );
          const createButton = actionButton("Start a session", "open-composer", "", true);
          state.append(createButton);
          content.append(state);
          return;
        }

        const list = document.createElement("ul");
        list.className = "session-list";
        list.setAttribute("aria-label", "Scotty sessions");

        for (const session of sessions) {
          const item = document.createElement("li");
          const status = sessionDisplayStatus(session.status, busy.get(session.id));
          item.className = `session status-${status}`;

          const identity = document.createElement("div");
          addText(identity, "repo", session.repo || "Unknown repository", "h2");
          const identityMeta = document.createElement("div");
          identityMeta.className = "identity-meta";
          addText(
            identityMeta,
            "branch",
            session.branch || session.defaultBranch || "No branch",
            "span",
          );
          addText(identityMeta, "identity-separator", "", "span");
          addText(identityMeta, "session-id", session.id, "span");
          identity.append(identityMeta);
          item.append(identity);

          const details = document.createElement("div");
          const statusLine = document.createElement("div");
          statusLine.className = "status-line";
          const signal = document.createElement("span");
          signal.className = "signal";
          signal.setAttribute("aria-hidden", "true");
          statusLine.append(
            signal,
            document.createTextNode(status === "stopping" ? "Stopping…" : status),
          );
          details.append(statusLine);
          const metrics = document.createElement("div");
          metrics.className = "metrics";
          addText(metrics, "", `${duration(session.ageSeconds)} old`, "span");
          addText(
            metrics,
            "",
            session.capRemainingSeconds > 0
              ? `${duration(session.capRemainingSeconds)} remaining`
              : "limit reached",
            "span",
          );
          details.append(metrics);
          item.append(details);

          const actions = document.createElement("div");
          actions.className = "actions";
          if (status === "stopping") {
            actions.append(actionButton("Stopping…", "sleep", session.id, true));
          } else if (status === "warm") {
            const open = document.createElement("a");
            open.className = "button button-primary";
            open.href = `/s/${encodeURIComponent(session.id)}`;
            open.dataset.focusKey = `open:${session.id}`;
            open.textContent = "Open";
            actions.append(open, actionButton("Stop", "sleep", session.id));
          } else if (status === "sleeping" || (status === "failed" && session.backupId)) {
            actions.append(actionButton("Resume & open", "resume", session.id, true));
          }
          if (status !== "stopping") {
            const deleteButton = actionButton("Delete", "confirm-delete", session.id);
            deleteButton.classList.add("button-danger");
            actions.append(deleteButton);
          }
          item.append(actions);

          if (status !== "stopping" && confirmations.has(session.id)) {
            const confirmation = document.createElement("div");
            confirmation.className = "confirmation";
            addText(
              confirmation,
              "confirmation-copy",
              "Permanently delete this session and its backups?",
              "span",
            );
            const confirmButton = actionButton("Delete permanently", "delete", session.id);
            confirmButton.classList.add("button-danger-confirm");
            confirmation.append(confirmButton, actionButton("Cancel", "cancel-delete", session.id));
            item.append(confirmation);
          }

          if (rowErrors.has(session.id)) {
            const error = addText(item, "row-error", rowErrors.get(session.id));
            error.setAttribute("role", "alert");
          }
          list.append(item);
        }
        content.append(list);
        if (focusKey) {
          content.querySelector(`[data-focus-key="${CSS.escape(focusKey)}"]`)?.focus();
        }
      }

      async function errorMessage(response, fallback) {
        try {
          const body = await response.json();
          return body?.error?.message || body?.message || fallback;
        } catch {
          return fallback;
        }
      }

      async function responseError(response, fallback) {
        try {
          const body = await response.json();
          return {
            message: body?.error?.message || body?.message || fallback,
            hint: body?.error?.hint || body?.hint,
          };
        } catch {
          return { message: fallback };
        }
      }

      async function refreshRepositories() {
        try {
          const response = await fetch("/api/repos", {
            credentials: "same-origin",
            cache: "no-store",
            headers: { Accept: "application/json" },
          });
          if (!response.ok) return;
          const body = await response.json();
          const next = Array.isArray(body) ? body : body?.repos;
          if (Array.isArray(next)) trackedRepositories = next;
        } catch {
          // Repository history is optional; manual owner/repo entry remains available.
        } finally {
          renderRepositorySuggestions();
        }
      }

      async function createSession() {
        if (creating) return;
        const repo = repositoryName(repoInput.value);
        const prompt = promptText(promptInput.value);
        repoInput.setCustomValidity(repo ? "" : "Enter a repository as owner/repository.");
        promptInput.setCustomValidity(prompt ? "" : "Tell Codex what to do.");
        if (!sessionForm.reportValidity() || !repo || !prompt) return;

        const payload = {
          repo,
          prompt,
          hardCapSeconds: Number(capSelect.value),
        };
        lastSubmission = submissionIdentity(lastSubmission, payload, () => crypto.randomUUID());
        setComposerFeedback(
          "pending",
          "Fetching the repository and launching Codex. This can take a moment…",
        );
        setCreating(true);
        const controller = new AbortController();
        createController = controller;
        createAbortReason = undefined;
        const timeout = setTimeout(() => {
          if (createController !== controller) return;
          createAbortReason = "timeout";
          controller.abort();
        }, 120_000);

        try {
          const response = await fetch("/api/sessions", {
            method: "POST",
            credentials: "same-origin",
            cache: "no-store",
            headers: {
              Accept: "application/json",
              "Content-Type": "application/json",
              "Idempotency-Key": lastSubmission.key,
            },
            body: JSON.stringify(payload),
            signal: controller.signal,
          });
          if (!response.ok) {
            const detail = await responseError(response, "The session could not be started.");
            const error = new Error(detail.message);
            error.hint = detail.hint;
            throw error;
          }
          const result = await response.json();
          if (typeof result?.id !== "string")
            throw new Error("Scotty returned an unexpected response.");
          const path = safeSessionPath(result.url, result.id, window.location.origin);
          if (!path) throw new Error("Scotty returned an unsafe session URL.");
          window.location.assign(path);
        } catch (error) {
          const abortReason = controller.signal.aborted ? createAbortReason : undefined;
          setComposerFeedback(
            "error",
            abortReason === "timeout"
              ? "Scotty is taking longer than expected."
              : abortReason === "cancel"
                ? "Session start canceled."
                : error instanceof Error
                  ? error.message
                  : "The session could not be started.",
            abortReason
              ? "Your values are preserved. Retry to safely check the same start request."
              : error instanceof Error && typeof error.hint === "string"
                ? error.hint
                : undefined,
          );
        } finally {
          clearTimeout(timeout);
          if (createController === controller) {
            createController = undefined;
            createAbortReason = undefined;
          }
          setCreating(false);
        }
      }

      async function refresh(options = {}) {
        if (fetching) return;
        fetching = true;
        refreshButton.disabled = true;
        if (!loaded) render();
        try {
          const response = await fetch("/api/sessions", {
            credentials: "same-origin",
            cache: "no-store",
            headers: { Accept: "application/json" },
          });
          if (!response.ok)
            throw new Error(await errorMessage(response, "Sessions could not be loaded."));
          const body = await response.json();
          const next = Array.isArray(body) ? body : body?.sessions;
          if (!Array.isArray(next)) throw new Error("Scotty returned an unexpected response.");
          sessions = next.filter(
            (session) => session && typeof session === "object" && typeof session.id === "string",
          );
          loaded = true;
          notice.hidden = true;
        } catch (error) {
          noticeText.textContent =
            error instanceof Error ? error.message : "Sessions could not be loaded.";
          notice.hidden = false;
          if (options.actionId) rowErrors.set(options.actionId, noticeText.textContent);
        } finally {
          fetching = false;
          refreshButton.disabled = false;
          renderRepositorySuggestions();
          render();
        }
      }

      async function perform(id, action) {
        if (busy.has(id)) return;
        busy.set(id, action);
        rowErrors.delete(id);
        render();
        const suffix = action === "delete" ? "" : `/${action}`;
        const method = action === "delete" ? "DELETE" : "POST";
        let succeeded = false;
        try {
          const response = await fetch(sessionPath(id, suffix), {
            method,
            credentials: "same-origin",
            cache: "no-store",
            headers: { Accept: "application/json" },
          });
          if (!response.ok) {
            throw new Error(await errorMessage(response, `Could not ${action} this session.`));
          }
          const result = await response.json();
          const expectedStatus =
            action === "delete" ? "gone" : action === "sleep" ? "sleeping" : "warm";
          if (result?.id !== id || result?.status !== expectedStatus)
            throw new Error("Scotty returned an unexpected response.");
          succeeded = true;
          confirmations.delete(id);
          if (action === "resume") {
            window.location.assign(`/s/${encodeURIComponent(id)}`);
            return;
          }
          if (action === "delete") sessions = sessions.filter((session) => session.id !== id);
          else
            sessions = sessions.map((session) =>
              session.id === id ? { ...session, ...result } : session,
            );
        } catch (error) {
          rowErrors.set(
            id,
            error instanceof Error ? error.message : `Could not ${action} this session.`,
          );
        } finally {
          busy.delete(id);
          if (succeeded) render();
          else await refresh({ actionId: id });
        }
      }

      content.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-action]");
        if (!button) return;
        const { action, id } = button.dataset;
        if (action === "open-composer") {
          setComposerOpen(true);
        } else if (action === "confirm-delete") {
          confirmations.add(id);
          render();
          content.querySelector(`[data-action="delete"][data-id="${CSS.escape(id)}"]`)?.focus();
        } else if (action === "cancel-delete") {
          confirmations.delete(id);
          render();
        } else {
          void perform(id, action);
        }
      });

      function schedulePoll() {
        clearInterval(pollTimer);
        if (!document.hidden) pollTimer = setInterval(() => void refresh(), POLL_INTERVAL);
      }

      document.addEventListener("visibilitychange", () => {
        schedulePoll();
        if (!document.hidden) void refresh();
      });
      refreshButton.addEventListener("click", () => void refresh());
      retryButton.addEventListener("click", () => void refresh());
      newSessionButton.addEventListener("click", () => {
        const open = composerRegion.classList.contains("is-open");
        if (open && creating) abortCreate("cancel");
        setComposerOpen(!open);
      });
      cancelSessionButton.addEventListener("click", () => {
        if (creating) abortCreate("cancel");
        setComposerOpen(false);
      });
      sessionForm.addEventListener("submit", (event) => {
        event.preventDefault();
        void createSession();
      });
      sessionForm.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && (event.metaKey || event.ctrlKey)) {
          event.preventDefault();
          sessionForm.requestSubmit();
        }
      });
      sessionForm.addEventListener("input", (event) => {
        if (event.target === repoInput) repoInput.setCustomValidity("");
        if (event.target === promptInput) promptInput.setCustomValidity("");
        if (composerFeedback.classList.contains("is-error")) setComposerFeedback();
      });

      fetch("/api/auth/me", {
        credentials: "same-origin",
        cache: "no-store",
        headers: { Accept: "application/json" },
      })
        .then((response) => (response.ok ? response.json() : undefined))
        .then((me) => {
          devicesLink.hidden = !Array.isArray(me?.scopes) || !me.scopes.includes("access:read");
        })
        .catch(() => undefined);

      schedulePoll();
      void refreshRepositories();
      void refresh();
    </script>
  </body>
</html>
