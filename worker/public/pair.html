<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#090d12" />
    <meta name="referrer" content="no-referrer" />
    <title>Pair with Scotty</title>
    <style>
      :root {
        color-scheme: dark;
        --space: oklch(13% 0.012 248);
        --shell: oklch(16% 0.014 248);
        --panel: #0b1016;
        --ink: oklch(93% 0.012 220);
        --muted: oklch(70% 0.025 230);
        --line: oklch(30% 0.025 235);
        --beam: oklch(79% 0.115 200);
        --danger: oklch(70% 0.16 25);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      * {
        box-sizing: border-box;
      }
      body {
        min-width: 280px;
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        background: var(--space);
        color: var(--ink);
      }
      .card {
        width: min(100%, 430px);
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 14px 45px oklch(3% 0.01 245 / 0.38);
      }
      .wordmark {
        color: var(--beam);
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 0.72rem;
        font-weight: 750;
        letter-spacing: 0.11em;
      }
      h1 {
        margin: 18px 0 8px;
        font-size: 1.55rem;
        letter-spacing: -0.03em;
      }
      p {
        margin: 0;
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.55;
      }
      label {
        display: block;
        margin-top: 22px;
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 650;
      }
      input {
        width: 100%;
        min-height: 46px;
        margin-top: 7px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 5px;
        outline: none;
        background: var(--shell);
        color: var(--ink);
        font: inherit;
      }
      input:focus {
        border-color: var(--beam);
        box-shadow: 0 0 0 3px oklch(79% 0.115 200 / 0.13);
      }
      .button {
        width: 100%;
        min-height: 46px;
        margin-top: 12px;
        border: 0;
        border-radius: 5px;
        background: var(--beam);
        color: oklch(18% 0.024 220);
        font: inherit;
        font-size: 0.82rem;
        font-weight: 750;
        text-decoration: none;
        cursor: pointer;
      }
      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .button:disabled {
        cursor: wait;
        opacity: 0.58;
      }
      .status {
        margin-top: 14px;
        color: var(--muted);
        font-size: 0.8rem;
        line-height: 1.5;
      }
      .status[data-kind="error"] {
        color: var(--danger);
      }
      .success {
        display: none;
      }
      .card[data-state="success"] .form {
        display: none;
      }
      .card[data-state="success"] .success {
        display: block;
      }
      @media (max-width: 480px) {
        .card {
          padding: 23px 20px;
        }
      }
    </style>
  </head>
  <body>
    <main class="card" id="card" data-state="ready">
      <div class="wordmark">SCOTTY / PAIR</div>
      <section class="form">
        <h1>Register this browser</h1>
        <p>
          This one-time link gives only this browser its own revocable Scotty session. It won't
          expose the administrator token.
        </p>
        <label for="label">Device label</label>
        <input id="label" maxlength="80" autocomplete="off" />
        <button class="button" id="pair" type="button">Pair this browser</button>
        <div class="status" id="status" role="status" aria-live="polite"></div>
      </section>
      <section class="success">
        <h1>Browser registered</h1>
        <p id="success-copy">This browser can now open Scotty sessions and terminals.</p>
        <a class="button" href="/sessions">Open sessions</a>
      </section>
    </main>
    <script>
      (() => {
        "use strict";
        const card = document.querySelector("#card");
        const button = document.querySelector("#pair");
        const label = document.querySelector("#label");
        const status = document.querySelector("#status");
        const token = new URLSearchParams(location.hash.slice(1)).get("token");
        history.replaceState({}, "", "/pair");

        function defaultLabel() {
          if (/iPhone|iPad/iu.test(navigator.userAgent)) return "My iPhone or iPad";
          if (/Android/iu.test(navigator.userAgent)) return "My Android device";
          if (/Helium/iu.test(navigator.userAgent)) return "Helium browser";
          return "My browser";
        }

        async function errorMessage(response) {
          try {
            const body = await response.json();
            return body?.error?.message || "This pairing link couldn't be used.";
          } catch {
            return "This pairing link couldn't be used.";
          }
        }

        async function pair() {
          if (!token || button.disabled) return;
          button.disabled = true;
          button.textContent = "Pairing…";
          status.dataset.kind = "";
          status.textContent = "Registering this browser with Scotty.";
          try {
            const response = await fetch("/api/auth/pairings/consume", {
              method: "POST",
              credentials: "same-origin",
              cache: "no-store",
              headers: { Accept: "application/json", "Content-Type": "application/json" },
              body: JSON.stringify({ token, label: label.value.trim() || defaultLabel() }),
            });
            if (!response.ok) throw new Error(await errorMessage(response));
            const body = await response.json();
            if (typeof body?.client?.id !== "string")
              throw new Error("Scotty returned an invalid response.");
            card.dataset.state = "success";
          } catch (error) {
            status.dataset.kind = "error";
            status.textContent = `${error instanceof Error ? error.message : "Pairing failed."} Ask an administrator browser for a fresh link.`;
            button.disabled = false;
            button.textContent = "Try again";
          }
        }

        label.value = defaultLabel();
        if (!token) {
          status.dataset.kind = "error";
          status.textContent =
            "This pairing link is missing its one-time token. Ask an administrator browser for a fresh link.";
          button.disabled = true;
        }
        button.addEventListener("click", () => void pair());
      })();
    </script>
  </body>
</html>
